  function renderChartHtml(m) {
    const days = m.messages_by_day || [];
    // Mapeamento métrica → field + label/formatter
    const metricConfig = {
      messages:     { field: 'messages',       title: 'Mensagens totais',  unit: 'msg',  fmt: v => `${v} msg${v !== 1 ? 's' : ''}` },
      unique_users: { field: 'unique_users',   title: 'Usuários únicos',   unit: 'user', fmt: v => `${v} usuário${v !== 1 ? 's' : ''} único${v !== 1 ? 's' : ''}` },
      autonomous:   { field: 'autonomous_pct', title: 'Taxa autônoma',     unit: '%',    fmt: v => `${v}%` },
      rated:        { field: 'rated',          title: 'Total avaliados',   unit: 'av',   fmt: v => `${v} avalia${v !== 1 ? 'ções' : 'ção'}` },
    };
    const cfg = metricConfig[chartMetric] || metricConfig.messages;
    const periodLabel = m.period_days === 30 ? 'últimos 30 dias' : (m.period_days === 15 ? 'últimos 15 dias' : 'últimos 7 dias');

    const vals = days.map(d => d[cfg.field] || 0);
    const max = Math.max(1, ...vals);

    // Adapta column count pra não ficar muito apertado em 30d (mostra rótulo a cada 3 dias)
    const labelEvery = m.period_days >= 30 ? 5 : (m.period_days >= 15 ? 3 : 1);

    return `
      <div class="chart-card">
        <h3>${cfg.title} por dia · ${periodLabel}</h3>
        <div class="bar-chart" style="grid-template-columns: repeat(${days.length}, 1fr);">
          ${days.map((d, idx) => {
            const v = d[cfg.field] || 0;
            const h = (v / max) * 100;
            const dayD = new Date(d.date + 'T00:00:00');
            const showLabel = (idx % labelEvery === 0) || idx === days.length - 1;
            const label = showLabel ? dayD.getDate() : '';
            return `
              <div class="bar-col">
                <div class="bar" style="height:${h}%">
                  <div class="bar-tip">${cfg.fmt(v)} · ${formatDateShort(d.date)}</div>
                </div>
                <div class="bar-label">${label}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  function renderSplitHtml(m) {
    const r = m.responded_vs_escalated;
    const total = r.responded + r.escalated_resolved + r.escalated_pending;
    const pctR  = total > 0 ? (r.responded / total) * 100 : 0;
    const pctRR = total > 0 ? (r.escalated_resolved / total) * 100 : 0;
    const pctP  = total > 0 ? (r.escalated_pending / total) * 100 : 0;

    const fb = m.feedback;
    const fbTotal = fb.up + fb.down + fb.none;
    const fbPctUp   = fbTotal > 0 ? (fb.up   / fbTotal) * 100 : 0;
    const fbPctDown = fbTotal > 0 ? (fb.down / fbTotal) * 100 : 0;
    const fbPctNone = fbTotal > 0 ? (fb.none / fbTotal) * 100 : 0;

    return `
      <div class="split-row">
        <div class="chart-card">
          <h3>Respondidas vs escaladas · 30 dias</h3>
          ${total === 0
            ? `<div class="empty-state" style="font-size:13px;">Sem dados no período.</div>`
            : `
              <div class="stacked-bar" role="img" aria-label="Distribuição de respostas">
                ${pctR  > 4 ? `<div class="seg responded" style="width:${pctR}%">${Math.round(pctR)}%</div>` : ''}
                ${pctRR > 4 ? `<div class="seg resolved"  style="width:${pctRR}%">${Math.round(pctRR)}%</div>` : ''}
                ${pctP  > 4 ? `<div class="seg pending"   style="width:${pctP}%">${Math.round(pctP)}%</div>` : ''}
              </div>
              <div class="stacked-legend">
                <span><span class="swatch responded"></span> Respondidas pela Zi (${r.responded})</span>
                <span><span class="swatch resolved"></span> Escaladas, resolvidas (${r.escalated_resolved})</span>
                <span><span class="swatch pending"></span> Escaladas, pendentes (${r.escalated_pending})</span>
              </div>
            `
          }
        </div>
        <div class="chart-card">
          <h3>Feedback dos colaboradores · total</h3>
          ${fbTotal === 0
            ? `<div class="empty-state" style="font-size:13px;">Sem dados ainda.</div>`
            : `
              <div class="stacked-bar" role="img" aria-label="Distribuição de feedback">
                ${fbPctUp   > 4 ? `<div class="seg responded" style="width:${fbPctUp}%">${Math.round(fbPctUp)}%</div>` : ''}
                ${fbPctDown > 4 ? `<div class="seg pending"   style="width:${fbPctDown}%">${Math.round(fbPctDown)}%</div>` : ''}
                ${fbPctNone > 4 ? `<div class="seg" style="width:${fbPctNone}%; background: var(--nv-line-strong); color: var(--nv-coffee);">${Math.round(fbPctNone)}%</div>` : ''}
              </div>
              <div class="stacked-legend">
                <span><span class="swatch responded"></span> 👍 (${fb.up})</span>
                <span><span class="swatch pending"></span> 👎 (${fb.down})</span>
                <span><span class="swatch" style="background:var(--nv-line-strong)"></span> sem avaliação (${fb.none})</span>
              </div>
            `
          }
        </div>
      </div>
    `;
  }

  function bindMetricsHandlers() {
    // Período (30/15/7)
    document.querySelectorAll('[data-period]').forEach(b => {
      b.onclick = () => {
        dashPeriod = parseInt(b.dataset.period, 10);
        reloadMetricsOnly();
      };
    });

    // KPI cards clicáveis — trocam a métrica do bar chart
    document.querySelectorAll('.kpi[data-metric]').forEach(card => {
      card.onclick = (e) => {
        // Não dispara se clicou no tooltip "?"
        if (e.target.closest('.kpi-hint')) return;
        chartMetric = card.dataset.metric;
        // Re-render local sem refetch (dados já estão em metricsData)
        const root = document.getElementById('metrics-root');
        if (root) {
          root.innerHTML = renderMetricsHtml();
          bindMetricsHandlers();
        }
      };
    });

    // Filtro por usuário
    const btn = document.getElementById('filter-btn');
    if (btn) btn.onclick = (e) => {
      e.stopPropagation();
      filterPanelOpen = !filterPanelOpen;
      const panel = document.getElementById('filter-panel');
      if (panel) panel.classList.toggle('open', filterPanelOpen);
    };

    document.querySelectorAll('[data-action="filter-toggle"]').forEach(input => {
      input.onchange = (e) => {
        const uname = e.target.dataset.uname;
        const opts = (metricsData?.user_options || []).map(o => o.username);
        if (selectedUsernames.length === 0) selectedUsernames = [...opts];
        if (e.target.checked) {
          if (!selectedUsernames.includes(uname)) selectedUsernames.push(uname);
        } else {
          selectedUsernames = selectedUsernames.filter(u => u !== uname);
        }
        if (selectedUsernames.length === opts.length) selectedUsernames = [];
        reloadMetricsOnly();
      };
    });

    const allBtn = document.querySelector('[data-action="filter-all"]');
    if (allBtn) allBtn.onclick = () => { selectedUsernames = []; reloadMetricsOnly(); };

    const noneBtn = document.querySelector('[data-action="filter-none"]');
    if (noneBtn) noneBtn.onclick = () => { selectedUsernames = ['__none_selected__']; reloadMetricsOnly(); };

    // Close panel on outside click
    if (filterPanelOpen) {
      const closeOnOutside = (e) => {
        const panel = document.getElementById('filter-panel');
        const btn = document.getElementById('filter-btn');
        if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
          filterPanelOpen = false;
          panel.classList.remove('open');
          document.removeEventListener('click', closeOnOutside);
        }
      };
      setTimeout(() => document.addEventListener('click', closeOnOutside), 0);
    }
  }

    try {
      pilotData = await apiPost('admin_pilot', { auth, period_days: dashPeriod });
      const root = document.getElementById('pilot-root');
      if (root) root.innerHTML = renderPilotHtml();
      bindPilotHandlers();

      console.error('[pilot] load falhou:', e);
      toast('Não rolou carregar Pilot 😬');

  /* ---------------- KB ingest (root admin only) ---------------- */
  function renderKbHtml() {
    if (!kbState.files) {
      return `
        <button class="btn btn-primary" id="kb-load">Carregar lista de arquivos</button>
      `;
    }
    const buttonsDisabled = kbState.running;
    const fileRows = kbState.files.map(f => {
      const st = kbState.status[f] || { state: 'idle' };
      let badge;
      if (st.state === 'running') badge = `<span class="kb-badge kb-running">processando…</span>`;
      else if (st.state === 'done') badge = `<span class="kb-badge kb-done">${st.count} chunks ✓</span>`;
      else if (st.state === 'error') badge = `<span class="kb-badge kb-error">erro: ${escapeHtml(st.error || '')}</span>`;
      else badge = `<span class="kb-badge kb-idle">aguardando</span>`;
      return `
        <div class="kb-row">
          <code>${escapeHtml(f)}</code>
          ${badge}
          <button class="btn btn-ghost kb-single" data-kb-file="${escapeHtml(f)}" ${buttonsDisabled ? 'disabled' : ''}>Só este</button>
        </div>
      `;
    }).join('');

    const logHtml = kbState.log.length === 0 ? '' : `
      <div class="kb-log">
        ${kbState.log.map(l => `<div class="kb-log-line">${escapeHtml(l)}</div>`).join('')}
      </div>
    `;

    return `
      <div class="kb-actions">
        <button class="btn btn-primary" id="kb-reingest-all" ${buttonsDisabled ? 'disabled' : ''}>
          ${kbState.running ? 'Processando…' : 'Reingestar todos'}
        </button>
        <button class="btn btn-ghost" id="kb-reload" ${buttonsDisabled ? 'disabled' : ''}>Recarregar lista</button>
        <span class="kb-summary">${kbState.files.length} arquivos · ${Object.values(kbState.status).filter(s => s.state === 'done').reduce((a, s) => a + (s.count || 0), 0)} chunks no total</span>
      </div>
      <div class="kb-list">${fileRows}</div>
      ${logHtml}
    `;
  }

  async function loadKbFiles() {
    const auth = getAuth();
    if (!auth || !isRootAdmin()) return;
    try {
      const data = await apiPost('admin_reingest_kb', { auth }); // sem source_file → lista
      kbState.files = data.files;
      kbState.status = {};
      reRenderKb();
    } catch (e) {
      toast('Não rolou carregar lista 😬');
      console.error('[kb] loadFiles falhou:', e);
    }
  }

  async function reingestKbFile(file) {
    const auth = getAuth();
    kbState.status[file] = { state: 'running' };
    reRenderKb();
    kbLog(`▶ ${file}`);
    try {
      const t0 = Date.now();
      const data = await apiPost('admin_reingest_kb', { auth, source_file: file });
      const dt = ((Date.now() - t0) / 1000).toFixed(1);
      kbState.status[file] = { state: 'done', count: data.chunks_inserted };
      kbLog(`✓ ${file} — ${data.chunks_inserted} chunks em ${dt}s`);
    } catch (e) {
      kbState.status[file] = { state: 'error', error: String(e.message || e) };
      kbLog(`✗ ${file} — ${e.message || e}`);
    }
    reRenderKb();
  }

  async function reingestAllKb() {
    if (!kbState.files || kbState.running) return;
    kbState.running = true;
    kbState.log = [];
    kbLog(`Iniciando reingest de ${kbState.files.length} arquivos…`);
    reRenderKb();
    for (const f of kbState.files) {
      await reingestKbFile(f);
    }
    kbState.running = false;
    const doneCount = Object.values(kbState.status).filter(s => s.state === 'done').reduce((a, s) => a + (s.count || 0), 0);
    const errCount  = Object.values(kbState.status).filter(s => s.state === 'error').length;
    kbLog(`Finalizado: ${doneCount} chunks inseridos · ${errCount} erros`);
    reRenderKb();
    toast(errCount === 0 ? 'KB reingestada com sucesso ✨' : `Finalizado com ${errCount} erro(s)`);
  }

  function kbLog(msg) {
    const ts = new Date().toLocaleTimeString('pt-BR', { hour12: false });
    kbState.log.push(`[${ts}] ${msg}`);
  }

  function reRenderKb() {
    const root = document.getElementById('kb-root');
    if (root) root.innerHTML = renderKbHtml();
    bindKbHandlers();
  }

  function bindKbHandlers() {
    const loadBtn = document.getElementById('kb-load');
    if (loadBtn) loadBtn.onclick = loadKbFiles;
    const reloadBtn = document.getElementById('kb-reload');
    if (reloadBtn) reloadBtn.onclick = loadKbFiles;
    const allBtn = document.getElementById('kb-reingest-all');
    if (allBtn) allBtn.onclick = reingestAllKb;
    document.querySelectorAll('[data-kb-file]').forEach(btn => {
      btn.onclick = () => reingestKbFile(btn.dataset.kbFile);
    });
  }

  function renderTrainedHtml() {
    if (adminTrained.length === 0) {
      return `<div class="empty-state">Nenhuma resposta treinada ainda.</div>`;
    }
    return adminTrained.map(t => `
      <div class="card card-trained" data-trained="${t.id}">
        <div class="card-meta">
          <span class="meta-name">Treinada em ${escapeHtml(formatDate(t.created_at))}</span>
          ${t.trained_by ? `<span>por ${escapeHtml(t.trained_by)}</span>` : ''}
        </div>
        <p class="card-question">"${escapeHtml(t.question)}"</p>
        <div class="card-answer">${renderInline(t.answer)}</div>
        <div class="card-actions">
          <button class="btn btn-ghost" data-action="delete-trained" data-id="${t.id}">Remover</button>
        </div>
      </div>
    `).join('');
  }

  function renderFeedbackHtml() {
    if (adminFeedback.length === 0) {
      return `<div class="empty-state">Ainda não há feedback registrado.</div>`;
    }
    const ups   = adminFeedback.filter(f => f.rating === 1).length;
    const downs = adminFeedback.filter(f => f.rating === -1).length;
    const total = adminFeedback.length;
    const upPct = total > 0 ? Math.round((ups / total) * 100) : 0;

    // Aplica o filtro selecionado (default: 👎)
    const visible = adminFeedback.filter(f => {
      if (feedbackFilter === 'down') return f.rating === -1;
      if (feedbackFilter === 'up')   return f.rating === 1;
      return true;
    });

    const summary = `
      <p class="section-hint" style="margin-bottom:14px">
        <strong>${ups}</strong> 👍 · <strong>${downs}</strong> 👎 · ${total} avaliações no total (${upPct}% positivas)
      </p>
    `;

    if (visible.length === 0) {
      return summary + `<div class="empty-state">Nenhum feedback no filtro atual. ${feedbackFilter === 'down' ? 'Sem avaliações negativas ainda — ✨' : ''}</div>`;
    }

    const cards = visible.map(f => `
      <div class="card card-feedback card-fb-${f.rating === 1 ? 'up' : 'down'}" data-feedback="${f.id}">
        <div class="card-meta">
          <span class="rating-badge">${f.rating === 1 ? '👍' : '👎'}</span>
          <span>${escapeHtml(formatDate(f.rating_at))}</span>
        </div>
        ${f.question ? `<p class="card-question">"${escapeHtml(f.question)}"</p>` : ''}
        <div class="card-answer">${renderInline(f.answer || '')}</div>
        <div class="card-actions">
          <button class="btn btn-ghost" data-action="delete-feedback" data-id="${f.id}">Remover</button>
        </div>
      </div>
    `).join('');

    return summary + cards;
  }

  function bindAdminHandlers() {
    document.querySelectorAll('[data-action="train-answer"]').forEach(btn => {
      btn.onclick = () => trainPending(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-pending"]').forEach(btn => {
      btn.onclick = () => deletePending(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-trained"]').forEach(btn => {
      btn.onclick = () => deleteTrained(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-feedback"]').forEach(btn => {
      btn.onclick = () => deleteFeedbackEntry(btn.dataset.id);
    });
    const logoutBtn = document.getElementById('admin-logout');
    if (logoutBtn) logoutBtn.onclick = logout;
    const refreshBtn = document.getElementById('admin-refresh');
    if (refreshBtn) refreshBtn.onclick = async () => {
      await loadAdminData();
      renderAdmin();
      toast('Atualizado');
    };
  }

  async function deleteFeedbackEntry(interactionId) {
    try {
      await apiPost('admin_clear_feedback', { auth: getAuth(), interactionId });
      adminFeedback = adminFeedback.filter(x => String(x.id) !== String(interactionId));
      renderAdmin();
      toast('Feedback removido');
    } catch (e) { console.error(e); toast('Erro ao remover'); }
  }

  async function trainPending(interactionId) {
    const answer = (document.getElementById(`ans-${interactionId}`)?.value || '').trim();
    if (!answer) { toast('Escreva uma resposta antes de salvar'); return; }
    try {
      await apiPost('admin_save_trained', { auth: getAuth(), interactionId, answer });
      await loadAdminData();
      renderAdmin();
      toast('Resposta treinada ✓');
    } catch (e) { console.error(e); toast('Erro ao treinar'); }
  }

  async function deletePending(interactionId) {
    try {
      await apiPost('admin_delete_pending', { auth: getAuth(), interactionId });
      adminPending = adminPending.filter(x => String(x.id) !== String(interactionId));
      pendingCount = adminPending.length;
      updateAdminBadge();
      renderAdmin();
      toast('Pergunta descartada');
    } catch (e) { console.error(e); toast('Erro ao descartar'); }
  }

  async function deleteTrained(trainedId) {
    try {
      await apiPost('admin_delete_trained', { auth: getAuth(), trainedId });
      adminTrained = adminTrained.filter(x => String(x.id) !== String(trainedId));
      renderAdmin();
      toast('Resposta removida');
    } catch (e) { console.error(e); toast('Erro ao remover'); }
  }

  /* ---------------- View toggle ---------------- */
  function switchView(view) {
    // Bloqueia user-role de navegar pro admin (defesa em profundidade — server também valida)
    if (view === 'admin' && !isAdmin()) return;
    currentView = view;
    document.querySelectorAll('.tab-btn').forEach(b => {
      const isActive = b.dataset.view === view;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    document.getElementById('view-chat').classList.toggle('active', view === 'chat');
    document.getElementById('view-admin').classList.toggle('active', view === 'admin');
    if (view === 'admin') {
      renderAdmin();
      if (isAdmin()) loadAdminData().then(renderAdmin);
    }
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ---------------- Login screen ---------------- */
  function showLoginScreen() {
    document.getElementById('login-avatar').innerHTML = ziAvatar(64, true);
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-header').style.visibility = 'hidden';
    document.querySelectorAll('main.view, #app-footer').forEach(el => { el.style.visibility = 'hidden'; });

    const form = document.getElementById('login-form');
    const userInput = document.getElementById('login-username');
    const passInput = document.getElementById('login-password');
    const errEl = document.getElementById('login-error');

    setTimeout(() => userInput.focus(), 80);

    form.onsubmit = (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const auth = tryLogin(userInput.value, passInput.value);
      if (!auth) {
        errEl.textContent = 'Usuário ou senha incorretos.';
        passInput.value = '';
        passInput.focus();
        return;
      }
      hideLoginScreen();
      bootApp();
    };
  }

  function hideLoginScreen() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-header').style.visibility = '';
    document.querySelectorAll('main.view, #app-footer').forEach(el => { el.style.visibility = ''; });
  }

  function applyRoleUI() {
    const auth = getAuth();
    const adminTab = document.getElementById('admin-tab');
    if (auth?.role === 'admin') {
      adminTab.style.display = '';
    } else {
      adminTab.style.display = 'none';
      // Garante que está no chat
      if (currentView === 'admin') switchView('chat');
    }
  }

  /* ---------------- Init ---------------- */
  function init() {
    // Wiring sempre, independente de auth
    document.getElementById('header-avatar').innerHTML = ziAvatar(52, true);

    document.querySelectorAll('.tab-btn').forEach(b => {
      b.onclick = () => switchView(b.dataset.view);
    });

    const input = document.getElementById('chat-input');
    input.addEventListener('input', autoResizeInput);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendUserMessage(input.value);
      }
    });
    document.getElementById('send-btn').onclick = () => sendUserMessage(input.value);
    document.getElementById('logout-btn').onclick = logout;

    // Gate: se não autenticado, mostra login. Senão, boot direto.
    if (!isAuthenticated()) {
      showLoginScreen();
      return;
    }
    bootApp();
  }

  function bootApp() {
    applyRoleUI();
    renderMessages();
    renderSuggestions();
    if (isAdmin()) refreshPendingCount();   // só admin precisa do contador
    document.getElementById('chat-input').focus();
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
