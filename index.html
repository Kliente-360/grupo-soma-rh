<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <title>Zi · Assistente de RH NV</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ============================================================
       * Design tokens — alinhados ao STYLEGUIDE.md (Grupo Soma)
       * Paleta: dark + terracota acento + off-white
       * ============================================================ */

      /* === Surfaces === */
      --nv-paper:        #FFFFFF;     /* color-soma-bg */
      --nv-cream:        #F8F9FA;     /* color-soma-surface (bolhas Zi, cards) */
      --nv-cream-deep:   #FCFCFD;     /* color-soma-elevated */
      --nv-surface:      #F8F9FA;

      /* === Ink === */
      --nv-coffee:       #1C1B1B;     /* color-soma-dark */
      --nv-coffee-soft:  #495057;
      --nv-coffee-mute:  #6C757D;     /* color-soma-muted */

      /* === Borders === */
      --nv-line:         #E9ECEF;     /* color-soma-border */
      --nv-line-strong:  #CED4DA;

      /* === Accent: Terracota Soma === */
      --nv-clay:         #D98A6C;     /* color-soma-accent */
      --nv-clay-dark:    #B86B4D;
      --nv-clay-light:   #F7E5DC;

      /* === Legado: navy aliasado pra terracota (compat com refs antigas) === */
      --nv-blue:         #D98A6C;
      --nv-blue-deep:    #B86B4D;
      --nv-blue-soft:    #F7E5DC;
      --nv-blue-tint:    #E8C9B8;

      /* === Semantic === */
      --nv-success:      #2D8456;
      --nv-success-soft: #DCE9E1;
      --nv-danger:       #C44536;
      --nv-danger-soft:  #F5DAD6;

      /* === Radii === */
      --radius-xs:       4px;
      --radius-sm:       8px;
      --radius-md:       12px;
      --radius-lg:       16px;
      --radius-bubble:   16px;
      --radius-card:     12px;
      --radius-xl:       24px;
      --radius-pill:     100px;

      /* === Elevations === */
      --shadow-xs:       0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm:       0 2px 8px rgba(0,0,0,0.05);
      --shadow-md:       0 8px 24px rgba(0,0,0,0.08);
      --shadow-lg:       0 20px 48px rgba(0,0,0,0.12);

      /* === Motion === */
      --ease-soft:       cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-spring:     cubic-bezier(0.34, 1.4, 0.5, 1);
      --dur-fast:        140ms;
      --dur-base:        220ms;
      --dur-slow:        350ms;

      /* === Layout === */
      --max-w:           860px;

      /* === Typography (Plus Jakarta Sans humanist) === */
      --font-display:    'Plus Jakarta Sans', 'Satoshi', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body:       'Plus Jakarta Sans', 'Satoshi', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--nv-paper);
      color: var(--nv-coffee);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss01", "cv11";
    }

    /* Accessibility: respeita o usuário */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    :focus-visible {
      outline: 2px solid var(--nv-clay);
      outline-offset: 2px;
      border-radius: var(--radius-xs);
    }

    /* ---------- Header ---------- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--nv-line);
      padding: 16px 24px;
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-id {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1 1 240px;
    }
    .header-text { min-width: 0; }
    .header-text h1 {
      margin: 0;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.4;
      color: var(--nv-coffee);
      letter-spacing: -0.01em;
    }
    .header-text p {
      margin: 2px 0 0 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--nv-coffee-mute);
      letter-spacing: 0.02em;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--nv-cream);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-pill);
      padding: 4px;
    }
    .tab-btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--nv-coffee-soft);
      background: transparent;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 8px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: color var(--dur-fast) var(--ease-soft),
                  background var(--dur-base) var(--ease-soft);
      letter-spacing: -0.005em;
    }
    .tab-btn:hover { color: var(--nv-coffee); }
    .tab-btn.active {
      background: var(--nv-coffee);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .badge {
      display: inline-block;
      min-width: 18px;
      padding: 0 6px;
      height: 18px;
      line-height: 18px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border-radius: var(--radius-pill);
      background: var(--nv-blue);
      color: white;
      letter-spacing: 0;
    }
    .tab-btn.active .badge { background: white; color: var(--nv-coffee); }

    /* ---------- Views ---------- */
    .view { display: none; }
    .view.active { display: block; }
    .view-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 20px 32px 20px;
    }

    /* ---------- Chat ---------- */
    .messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 8px;
    }
    .msg-block {
      display: flex;
      flex-direction: column;
      animation: msg-enter var(--dur-base) var(--ease-soft);
    }
    @keyframes msg-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 100%;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(78%, 620px);
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-shadow: var(--shadow-xs);
    }
    .bubble strong { font-weight: 600; }
    .bubble a {
      color: var(--nv-clay);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      transition: color var(--dur-fast) var(--ease-soft);
    }
    .bubble a:hover { color: var(--nv-clay-dark); }
    .msg-row.user .bubble a { color: inherit; text-decoration-color: rgba(255,255,255,0.5); }

    .msg-row.user .bubble {
      background: var(--nv-coffee);
      color: white;
      border-radius: var(--radius-bubble) var(--radius-bubble) 4px var(--radius-bubble);
    }
    .msg-row.assistant .bubble {
      background: var(--nv-surface);
      color: var(--nv-coffee);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 4px;
    }
    .msg-block { margin-bottom: 12px; }

    .msg-row .avatar-slot {
      flex-shrink: 0;
      align-self: flex-end;
    }

    /* typing */
    .typing { display: inline-flex; gap: 5px; padding: 6px 2px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      background: var(--nv-coffee-soft);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.3s var(--ease-soft) infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: translateY(0) scale(0.85); }
      50%      { opacity: 1;    transform: translateY(-2px) scale(1); }
    }

    /* escalation */
    .escalation-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      padding: 11px 22px;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-soft),
                  color var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft);
      line-height: 1.2;
      letter-spacing: -0.005em;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--nv-coffee);
      color: white;
      box-shadow: var(--shadow-xs);
    }
    .btn-primary:hover { background: #000000; box-shadow: var(--shadow-sm); }
    .btn-secondary {
      background: transparent;
      color: var(--nv-coffee);
      border-color: var(--nv-line);
    }
    .btn-secondary:hover {
      background: var(--nv-cream);
      border-color: var(--nv-coffee);
    }
    .btn-ghost {
      background: transparent;
      color: var(--nv-coffee-soft);
      border-color: transparent;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-ghost:hover { color: var(--nv-clay-dark); background: var(--nv-clay-light); }

    .escalation-form {
      margin-top: 14px;
      padding: 14px;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .escalation-form label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--nv-coffee-soft);
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }
    .escalation-form input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-sm);
      background: var(--nv-surface);
      color: var(--nv-coffee);
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft);
    }
    .escalation-form input:focus {
      outline: none;
      border-color: var(--nv-clay);
      box-shadow: 0 0 0 3px var(--nv-clay-light);
    }
    .escalation-form .row { display: flex; justify-content: flex-end; gap: 8px; }

    /* suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
      padding-bottom: 4px;
    }
    .suggestions-label {
      width: 100%;
      font-size: 11px;
      font-weight: 500;
      color: var(--nv-coffee-mute);
      margin-bottom: 4px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .chip {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--nv-coffee);
      background: transparent;
      border: 1px solid var(--nv-coffee);
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft);
      letter-spacing: -0.005em;
    }
    .chip:hover {
      background: var(--nv-clay-light);
      border-color: var(--nv-clay);
      transform: translateY(-1px);
    }
    .chip:active {
      background: var(--nv-clay);
      border-color: var(--nv-clay);
      color: white;
      transform: translateY(0);
    }

    /* input bar */
    .input-bar-wrap {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to bottom, rgba(251,248,243,0) 0%, var(--nv-paper) 28%);
      padding: 22px 24px 18px 24px;
      z-index: 10;
    }
    .input-bar {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-xl);
      padding: 12px 16px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-base) var(--ease-soft);
    }
    .input-bar:focus-within {
      border-color: var(--nv-clay);
      box-shadow: 0 0 0 3px var(--nv-clay-light), var(--shadow-sm);
    }
    #chat-input {
      flex: 1;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      color: var(--nv-coffee);
      background: transparent;
      border: 0;
      outline: none;
      resize: none;
      max-height: 140px;
      padding: 8px 4px;
      letter-spacing: 0.1px;
    }
    #chat-input::placeholder { color: var(--nv-coffee-mute); }
    #send-btn {
      flex-shrink: 0;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--nv-coffee);
      color: white;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft);
    }
    #send-btn:hover:not(:disabled) { background: #000000; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { background: var(--nv-line-strong); cursor: not-allowed; opacity: 0.6; }

    /* ---------- Pilot dashboard ---------- */
    .pilot-section {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--nv-line);
    }
    .pilot-h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--nv-coffee);
      margin: 0 0 12px 0;
      letter-spacing: -0.01em;
    }
    .pilot-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      background: var(--nv-paper);
    }
    .pilot-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .pilot-table th {
      text-align: left;
      padding: 12px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      border-bottom: 1px solid var(--nv-line);
      background: var(--nv-surface);
      white-space: nowrap;
    }
    .pilot-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--nv-line);
      color: var(--nv-coffee);
      vertical-align: middle;
      white-space: nowrap;
    }
    .pilot-table tr:last-child td { border-bottom: none; }
    .pilot-table tr:hover td { background: var(--nv-surface); }

    .pilot-cat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pilot-cat-row {
      display: grid;
      grid-template-columns: 160px 1fr 120px;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .pilot-cat-name { font-weight: 500; color: var(--nv-coffee); }
    .pilot-cat-bar {
      height: 8px;
      background: var(--nv-line);
      border-radius: 4px;
      overflow: hidden;
    }
    .pilot-cat-bar-fill {
      height: 100%;
      background: var(--nv-clay);
      border-radius: 4px;
      transition: width var(--dur-base) var(--ease-soft);
    }
    .pilot-cat-num { text-align: right; font-variant-numeric: tabular-nums; }

    .pilot-comments {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pilot-comment-card {
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-left: 3px solid var(--nv-clay);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .pilot-comment-meta {
      font-size: 12px;
      color: var(--nv-coffee-mute);
      margin-bottom: 6px;
    }
    .pilot-comment-question {
      font-size: 13px;
      color: var(--nv-coffee-soft);
      font-style: italic;
      margin-bottom: 8px;
    }
    .pilot-comment-text {
      font-size: 13.5px;
      color: var(--nv-coffee);
      line-height: 1.45;
    }

    /* ---------- KB ingest panel ---------- */
    .kb-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .kb-summary {
      font-size: 12.5px;
      color: var(--nv-coffee-mute);
      margin-left: auto;
    }
    .kb-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .kb-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      font-size: 13px;
    }
    .kb-row code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
      color: var(--nv-coffee);
    }
    .kb-badge {
      font-size: 11.5px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      letter-spacing: -0.005em;
      white-space: nowrap;
    }
    .kb-idle    { background: var(--nv-line); color: var(--nv-coffee-mute); }
    .kb-running { background: var(--nv-clay-light); color: var(--nv-clay-dark); animation: kbPulse 1.4s infinite; }
    .kb-done    { background: var(--nv-success-soft, #d6e8db); color: #2c5d3f; }
    .kb-error   { background: var(--nv-danger-soft, #f1d8d2); color: #7a2e1a; }
    @keyframes kbPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    .kb-single { font-size: 12px; padding: 5px 12px; }
    .kb-log {
      margin-top: 20px;
      max-height: 260px;
      overflow-y: auto;
      background: #1c1b1b;
      color: #d4d4d4;
      padding: 14px;
      border-radius: var(--radius-md);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .kb-log-line { white-space: pre-wrap; }

    /* ---------- Admin: sub-tabs ---------- */
    .subtabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--nv-line);
      margin-bottom: 28px;
      overflow-x: auto;
    }
    .subtab-btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--nv-coffee-mute);
      background: transparent;
      border: 0;
      padding: 12px 16px;
      cursor: pointer;
      position: relative;
      letter-spacing: -0.005em;
      transition: color var(--dur-fast) var(--ease-soft);
      white-space: nowrap;
    }
    .subtab-btn::after {
      content: "";
      position: absolute;
      left: 12px; right: 12px; bottom: -1px;
      height: 2px;
      background: transparent;
      transition: background var(--dur-fast) var(--ease-soft);
    }
    .subtab-btn:hover { color: var(--nv-coffee); }
    .subtab-btn.active { color: var(--nv-coffee); }
    .subtab-btn.active::after { background: var(--nv-clay); }
    .subtab-btn .subtab-badge {
      display: inline-block;
      margin-left: 6px;
      min-width: 18px;
      padding: 0 6px;
      height: 18px;
      line-height: 18px;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      border-radius: var(--radius-pill);
      background: var(--nv-clay);
      color: white;
    }

    /* ---------- Admin: Dashboard ---------- */
    .period-toggle {
      display: inline-flex;
      gap: 2px;
      background: var(--nv-cream);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-pill);
      padding: 3px;
    }
    .period-toggle button {
      font: 600 11px/1 var(--font-body);
      letter-spacing: 0.02em;
      background: transparent;
      border: 0;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: var(--radius-pill);
      color: var(--nv-coffee-mute);
      transition: all var(--dur-fast) var(--ease-soft);
      text-transform: uppercase;
    }
    .period-toggle button:hover { color: var(--nv-coffee); }
    .period-toggle button.active {
      background: var(--nv-coffee);
      color: white;
    }

    /* KPI cards — agora clicáveis pra trocar a métrica do chart */
    .kpi { cursor: pointer; position: relative; }
    .kpi.kpi--inactive { opacity: 0.65; }
    .kpi.kpi--active {
      border-color: var(--nv-clay);
      background: var(--nv-clay-light);
      box-shadow: 0 0 0 2px var(--nv-clay-light), var(--shadow-sm);
    }
    .kpi.kpi--active .kpi-label,
    .kpi.kpi--active .kpi-value { color: var(--nv-clay-dark); }
    .kpi.kpi--active::after {
      content: "Em destaque no gráfico ↓";
      position: absolute;
      bottom: 6px;
      right: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nv-clay-dark);
    }
    .kpi-hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--nv-line);
      color: var(--nv-coffee-soft);
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
      cursor: help;
      position: relative;
    }
    .kpi-hint:hover { background: var(--nv-coffee); color: white; }
    .kpi-hint:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      background: var(--nv-coffee);
      color: white;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      padding: 8px 10px;
      border-radius: 6px;
      line-height: 1.4;
      z-index: 10;
      pointer-events: none;
    }

    /* Feedback section: filter pills */
    .feedback-filter {
      display: inline-flex;
      gap: 4px;
      background: var(--nv-cream);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-pill);
      padding: 3px;
      margin-bottom: 16px;
    }
    .feedback-filter button {
      font: 600 12px/1 var(--font-body);
      background: transparent;
      border: 0;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: var(--radius-pill);
      color: var(--nv-coffee-mute);
      transition: all var(--dur-fast) var(--ease-soft);
      letter-spacing: -0.005em;
    }
    .feedback-filter button:hover { color: var(--nv-coffee); }
    .feedback-filter button.active {
      background: var(--nv-coffee);
      color: white;
    }

    /* ---------- Admin: Dashboard de métricas ---------- */
    .metrics-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .metrics-bar .label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
    }
    .filter-shell { position: relative; }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      font: 600 13px/1.2 var(--font-body);
      color: var(--nv-coffee);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-soft);
      letter-spacing: -0.005em;
    }
    .filter-btn:hover { border-color: var(--nv-coffee); }
    .filter-btn .chev { font-size: 10px; opacity: 0.6; }
    .filter-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 340px;
      max-height: 380px;
      overflow-y: auto;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: 8px;
      z-index: 30;
      display: none;
    }
    .filter-panel.open { display: block; }
    .filter-panel .filter-head {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px 10px;
      border-bottom: 1px solid var(--nv-line);
      margin-bottom: 6px;
    }
    .filter-panel .filter-head button {
      background: transparent;
      border: 0;
      color: var(--nv-clay-dark);
      font: 600 12px/1 var(--font-body);
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.02em;
    }
    .filter-panel .filter-head button:hover { color: var(--nv-coffee); }
    .filter-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--nv-coffee);
      transition: background var(--dur-fast) var(--ease-soft);
    }
    .filter-option:hover { background: var(--nv-cream); }
    .filter-option input { margin-top: 2px; accent-color: var(--nv-clay); }
    .filter-option .opt-meta {
      display: block;
      font-size: 11px;
      color: var(--nv-coffee-mute);
      margin-top: 2px;
    }

    /* KPI cards */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .kpi {
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      padding: 18px;
      transition: box-shadow var(--dur-base) var(--ease-soft);
    }
    .kpi:hover { box-shadow: var(--shadow-xs); }
    .kpi .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      margin-bottom: 8px;
    }
    .kpi .kpi-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--nv-coffee);
      margin-bottom: 4px;
    }
    .kpi .kpi-sub {
      font-size: 12px;
      color: var(--nv-coffee-soft);
      line-height: 1.4;
    }
    .kpi .kpi-sub.up   { color: var(--nv-success); font-weight: 600; }
    .kpi .kpi-sub.down { color: var(--nv-danger); font-weight: 600; }

    /* Progress bar inside KPI */
    .kpi-progress {
      margin-top: 10px;
      height: 6px;
      background: var(--nv-cream);
      border-radius: var(--radius-pill);
      overflow: hidden;
      position: relative;
    }
    .kpi-progress .kpi-progress-fill {
      height: 100%;
      background: var(--nv-clay);
      border-radius: var(--radius-pill);
      transition: width var(--dur-slow) var(--ease-soft);
    }
    .kpi-progress .kpi-progress-fill.target-met { background: var(--nv-success); }
    .kpi-progress .kpi-target-line {
      position: absolute;
      top: -2px;
      bottom: -2px;
      width: 2px;
      background: var(--nv-coffee);
      opacity: 0.55;
    }
    .kpi-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      margin-top: 6px;
      font-weight: 600;
    }
    .kpi-meta .met { color: var(--nv-success); }
    .kpi-meta .miss { color: var(--nv-clay-dark); }

    /* Charts */
    .chart-card {
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      padding: 18px;
      margin-bottom: 20px;
    }
    .chart-card h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      margin: 0 0 14px 0;
    }
    .bar-chart {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 4px;
      align-items: end;
      height: 120px;
    }
    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      background: var(--nv-clay);
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height var(--dur-slow) var(--ease-soft);
      cursor: default;
      position: relative;
    }
    .bar:hover { background: var(--nv-clay-dark); }
    .bar:hover .bar-tip { opacity: 1; }
    .bar-tip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--nv-coffee);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity var(--dur-fast) var(--ease-soft);
      pointer-events: none;
    }
    .bar-label {
      font-size: 10px;
      color: var(--nv-coffee-mute);
      letter-spacing: 0.02em;
    }

    /* Split row: 2 cards lado a lado */
    .split-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    /* Stacked bar (respondidas vs escaladas) */
    .stacked-bar {
      display: flex;
      height: 36px;
      border-radius: var(--radius-pill);
      overflow: hidden;
      background: var(--nv-cream);
      margin: 12px 0 8px;
    }
    .stacked-bar .seg {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: width var(--dur-slow) var(--ease-soft);
    }
    .stacked-bar .seg.responded { background: var(--nv-success); }
    .stacked-bar .seg.resolved  { background: var(--nv-clay); }
    .stacked-bar .seg.pending   { background: var(--nv-danger); }
    .stacked-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 11px;
      color: var(--nv-coffee-soft);
      letter-spacing: 0.02em;
    }
    .stacked-legend .swatch {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .stacked-legend .swatch.responded { background: var(--nv-success); }
    .stacked-legend .swatch.resolved  { background: var(--nv-clay); }
    .stacked-legend .swatch.pending   { background: var(--nv-danger); }

    /* SLA cards */
    .sla-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .sla-card {
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      padding: 20px;
    }
    .sla-card .sla-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      margin-bottom: 10px;
    }
    .sla-card .sla-value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--nv-clay-dark);
      margin-bottom: 6px;
    }
    .sla-card .sla-sub {
      font-size: 12px;
      color: var(--nv-coffee-soft);
      line-height: 1.5;
    }

    /* Tabela top escalações */
    .escalations-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .escalations-table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--nv-coffee-mute);
      border-bottom: 1px solid var(--nv-line);
    }
    .escalations-table td {
      padding: 12px;
      border-bottom: 1px solid var(--nv-line);
      vertical-align: top;
      color: var(--nv-coffee);
    }
    .escalations-table td.q { font-weight: 500; }
    .escalations-table .status-pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--radius-pill);
    }
    .escalations-table .status-pill.resolved { background: var(--nv-success-soft); color: var(--nv-success); }
    .escalations-table .status-pill.pending  { background: var(--nv-danger-soft); color: var(--nv-danger); }

    @media (max-width: 720px) {
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .split-row, .sla-row { grid-template-columns: 1fr; }
      .bar-chart { grid-template-columns: repeat(7, 1fr); }
      .bar-chart .bar-col:nth-child(n+8) { display: none; }
      .filter-panel { width: 280px; }
    }

    /* ---------- Admin ---------- */
    .admin-section { margin-bottom: 44px; }
    .admin-section h2 {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: var(--nv-coffee);
      margin: 0 0 6px 0;
    }
    .admin-section .section-hint {
      font-size: 14px;
      color: var(--nv-coffee-soft);
      margin: 0 0 20px 0;
      line-height: 1.5;
      max-width: 60ch;
    }
    .empty-state {
      padding: 32px 24px;
      background: var(--nv-cream);
      border: 1px dashed var(--nv-line-strong);
      border-radius: var(--radius-card);
      text-align: center;
      color: var(--nv-coffee-soft);
      font-size: 14px;
    }
    .card {
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-xs);
      transition: box-shadow var(--dur-base) var(--ease-soft),
                  border-color var(--dur-base) var(--ease-soft);
    }
    .card:hover { box-shadow: var(--shadow-sm); }
    .card-trained {
      border-left: 3px solid var(--nv-clay);
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      font-size: 12px;
      color: var(--nv-coffee-soft);
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }
    .card-meta .meta-name { font-weight: 600; color: var(--nv-coffee); }
    .card-question {
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 600;
      font-size: 15px;
      color: var(--nv-coffee);
      margin: 0 0 14px 0;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .card-answer {
      color: var(--nv-coffee);
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .card textarea {
      width: 100%;
      min-height: 110px;
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.55;
      padding: 12px 14px;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-sm);
      background: var(--nv-paper);
      color: var(--nv-coffee);
      resize: vertical;
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft),
                  background var(--dur-fast) var(--ease-soft);
    }
    .card textarea:focus {
      outline: none;
      border-color: var(--nv-clay);
      background: var(--nv-paper);
      box-shadow: 0 0 0 3px var(--nv-clay-light);
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    /* ---------- Footer ---------- */
    .app-footer {
      text-align: center;
      font-size: 11px;
      color: var(--nv-coffee-mute);
      padding: 14px 20px 22px 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--nv-coffee);
      color: var(--nv-paper);
      padding: 11px 20px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease-soft),
                  transform var(--dur-base) var(--ease-spring);
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.soft-alert {
      background: #fff;
      color: var(--nv-clay-dark);
      border: 1px solid var(--nv-clay);
      box-shadow: 0 8px 24px rgba(217, 138, 108, 0.18), var(--shadow-lg);
      padding: 12px 18px 12px 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .toast.soft-alert::before {
      content: "✨";
      font-size: 15px;
    }

    /* Shake suave quando usuário tenta interagir sem votar */
    .feedback.feedback-required.shake {
      animation: fbShake 0.42s var(--ease-soft);
    }
    @keyframes fbShake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-4px); }
      40%      { transform: translateX(4px); }
      60%      { transform: translateX(-3px); }
      80%      { transform: translateX(2px); }
    }

    /* ---------- Streaming cursor ---------- */
    .cursor {
      display: inline-block;
      width: 6px;
      height: 1em;
      background: var(--nv-clay);
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: cursor-blink 0.9s steps(2) infinite;
      opacity: 0.85;
      border-radius: 1px;
    }
    @keyframes cursor-blink { 50% { opacity: 0; } }

    /* ---------- Feedback (Curti / Pode melhorar) ---------- */
    .feedback {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-left: 40px;
      align-items: center;
    }
    .fb-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      font-size: 13px;
      font-weight: 500;
      color: var(--nv-coffee-soft);
      cursor: pointer;
      padding: 6px 12px 6px 10px;
      border-radius: var(--radius-pill);
      opacity: 0.85;
      transition: opacity var(--dur-fast) var(--ease-soft),
                  background var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-spring);
      line-height: 1;
      font-family: var(--font-body);
      letter-spacing: -0.005em;
    }
    .fb-btn .fb-emoji { font-size: 14px; line-height: 1; }
    .fb-btn:hover:not(:disabled) {
      opacity: 1;
      color: var(--nv-coffee);
      border-color: var(--nv-coffee);
      transform: translateY(-1px);
    }
    .fb-btn[aria-pressed="true"] {
      opacity: 1;
      background: var(--nv-clay-light);
      border-color: var(--nv-clay);
      color: var(--nv-clay-dark);
      transform: none;
    }
    .fb-btn[aria-pressed="true"] .fb-label { font-weight: 600; }
    .fb-btn:disabled { cursor: default; }

    /* Form de comentário pro 👎 — contexto pro que faltou */
    .fb-comment {
      margin-top: 10px;
      margin-left: 40px;
      padding: 12px 14px;
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md, 12px);
      max-width: 520px;
    }
    .fb-comment-label {
      font-size: 12.5px;
      color: var(--nv-coffee-mute);
      margin-bottom: 8px;
      letter-spacing: -0.005em;
    }
    .fb-comment textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--nv-coffee);
      background: #fff;
      border: 1px solid var(--nv-line);
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
      letter-spacing: -0.005em;
    }
    .fb-comment textarea:focus {
      outline: none;
      border-color: var(--nv-clay);
    }
    .fb-comment-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: flex-end;
    }
    .fb-comment-actions .btn { font-size: 12.5px; padding: 6px 14px; }

    /* Gate: pede pra avaliar antes de mandar próxima pergunta */
    .feedback.feedback-required {
      flex-wrap: wrap;
      padding: 10px 14px;
      margin-left: 40px;
      background: var(--nv-clay-light);
      border: 1px solid var(--nv-clay);
      border-radius: var(--radius-md, 12px);
      animation: fbPulse 2s var(--ease-soft) infinite;
    }
    .feedback.feedback-required .feedback-hint {
      font-size: 13px;
      color: var(--nv-clay-dark);
      font-weight: 600;
      letter-spacing: -0.005em;
      flex-basis: 100%;
      margin-bottom: 4px;
    }
    .feedback.feedback-required .fb-btn {
      background: #fff;
      border-color: var(--nv-clay);
      color: var(--nv-clay-dark);
      opacity: 1;
    }
    @keyframes fbPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 138, 108, 0.0); }
      50%      { box-shadow: 0 0 0 6px rgba(217, 138, 108, 0.12); }
    }

    /* ---------- Admin gate (PIN) ---------- */
    .admin-gate {
      max-width: 380px;
      margin: 56px auto;
      text-align: center;
      padding: 40px 32px;
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
    }
    .admin-gate h2 {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 20px;

  <script>
  /* =====================================================
   * Zi · Chatbot RH NV — Protótipo (single-file)
   * ===================================================== */

  // Toda a comunicação passa pela edge function /api/zi (Netlify).
  // Ela faz: retrieval no Supabase (pgvector) → Gemini stream → persistência
  // (zi_interactions, zi_trained_answers). KB e respostas treinadas vivem
  // no Supabase — o cliente não conhece nada disso.
  const API_URL = "/api/zi";

  // Credenciais de acesso — fricção, não segurança. Validado também no servidor.
  // Pra mudar perfis em produção: mover pra SSO (Google Workspace) ou Supabase Auth.
  const CREDENTIALS = {
    admin:             { password: "adminnv26",  role: "admin" },
    user:              { password: "usernv26",   role: "user"  },
    "mariana.saran":   { password: "r6xuw5dtrc", role: "admin" },
    "waleska.jardim":  { password: "hbyxw9l95b", role: "admin" },
    "nathalie.souza":  { password: "q0qtqphxa1", role: "admin" },
    "paulo.cardozo":   { password: "5mwkrvnc7c", role: "admin" },
    "adriana.cerqueira": { password: "swxfzhnhwe", role: "admin" },
  };
  const AUTH_KEY = "zi_auth";
  const SESSION_ID_KEY = "zi_session_id";

  const SUGGESTIONS = [
    "Como funciona o vale-refeição?",
    "Quantos dias de DayOff tenho este ano?",
    "Quando cai meu salário?",
    "Como funciona o programa Movimenta?",
    "Qual o desconto na Farm e na NV?",
    "Como solicito férias?",
    "Onde acesso meu contracheque?",
    "Como funciona o plano de saúde?",
    "O que faço se receber um e-mail suspeito?",
  ];

  const WELCOME_TEXT =
    "Pode mandar sua dúvida — admissão, demissão, benefícios, férias, plano de saúde, segurança da informação… o que rolar. ✨";

  /* ---------------- Base de Conhecimento (REMOVIDA) ----------------
   * Antes era um template literal de ~200 linhas no client. Agora vive
   * no Supabase (tabela kb_chunks) e é recuperada pela edge function via
   * embedding + match_kb_chunks. Veja netlify/edge-functions/zi.js e kb/.
   * ----------------------------------------------------------------- */


  /* ---------------- Avatar (foto real da Zilaide) ----------------
   * Foto profissional servida de assets/zi-avatar.jpg.
   * Spec: STYLEGUIDE.md §9. Substituir foto: trocar o arquivo,
   * manter aspect 1:1 e mín. 512px (renderiza em retina @64).
   * ---------------------------------------------------------------- */
  function ziAvatar(size = 40, ring = false) {
    const ringStyle = ring
      ? 'box-shadow: 0 0 0 2px var(--nv-paper), 0 0 0 3px var(--nv-line);'
      : '';
    const style = [
      `width:${size}px`,
      `height:${size}px`,
      'border-radius:50%',
      'object-fit:cover',
      'object-position:50% 22%',  // mantém o rosto centralizado depois do crop circular
      'display:block',
      'flex-shrink:0',
      ringStyle,
    ].filter(Boolean).join('; ');
    return `<img src="assets/zi-avatar.jpg" width="${size}" height="${size}" alt="Zi" loading="lazy" style="${style}" />`;
  }

  /* ---------------- Helpers ---------------- */
  function uidStr() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function nowISO() { return new Date().toISOString(); }

  function formatDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('pt-BR', { day: '2-digit', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }

  /* ---------------- API client (edge function /api/zi) ---------------- */
  function getSessionId() {
    let id = sessionStorage.getItem(SESSION_ID_KEY);
    if (!id) {
      id = (crypto.randomUUID?.() || uidStr() + uidStr());
      sessionStorage.setItem(SESSION_ID_KEY, id);
    }
    return id;
  }

  async function apiPost(action, payload = {}) {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload }),
    });
    if (!resp.ok) {
      const text = await resp.text().catch(() => '');
      let detail = text;
      try { detail = JSON.parse(text)?.error?.message || text; } catch {}
      throw new Error(`${action} HTTP ${resp.status}: ${detail.slice(0, 300)}`);
    }
    return resp.json();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ** ** -> <strong>, URLs -> <a>, newlines -> <br>
  function renderInline(text) {
    let s = escapeHtml(text);
    // bold
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // auto-link URLs
    s = s.replace(/(https?:\/\/[^\s<]+[^\s<.,;:!?)])/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // newlines
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  function toast(msg, opts = {}) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('soft-alert', !!opts.soft);
    el.classList.add('show');
    clearTimeout(toast._t);
    const dur = opts.duration || 1800;
    toast._t = setTimeout(() => {
      el.classList.remove('show');
      el.classList.remove('soft-alert');
    }, dur);
  }

  /* ---------------- State ---------------- */
  let messages = [
    { id: uidStr(), role: 'assistant', content: WELCOME_TEXT, type: 'regular' }
  ];
  let pendingCount = 0;          // populado por refreshPendingCount()
  let currentView = 'chat';
  let isWaitingReply = false;

  /* ---------------- Chat streaming via edge function ---------------- */

  // Envia o histórico atual (incluindo a mensagem do user que acabou de chegar)
  // pra /api/zi. Edge function: embed → match_kb_chunks (Supabase) → Gemini stream.
  // Retorna { full, interactionId }. onChunk(textoAcumulado) chamado a cada delta.
  async function callChat(history, onChunk) {
    const payloadMessages = history
      .filter(m => m.type !== 'typing' && m.type !== 'streaming')
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.content }));

    // Pula a 1ª mensagem se for boas-vindas do assistente — Gemini exige user no início
    if (payloadMessages.length && payloadMessages[0].role === 'assistant') {
      payloadMessages.shift();
    }

    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'chat',
        messages: payloadMessages,
        session_id: getSessionId(),
        auth: getAuth(),   // captura username pro dashboard (admin/user)
      }),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status} — ${errText.slice(0, 400)}`);
    }

    const interactionId = resp.headers.get('X-Interaction-Id') || null;

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let full = '';
    let lastFinishReason = null;
    let blockReason = null;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let nl;
      while ((nl = buffer.indexOf('\n')) >= 0) {
        const line = buffer.slice(0, nl).trim();
        buffer = buffer.slice(nl + 1);
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (!payload) continue;

        let obj;
        try { obj = JSON.parse(payload); } catch { continue; }

        if (obj.error) {
          throw new Error(`Stream error: ${JSON.stringify(obj.error).slice(0, 300)}`);
        }
        if (obj.promptFeedback?.blockReason) blockReason = obj.promptFeedback.blockReason;

        const cand = obj.candidates?.[0];
        if (cand?.finishReason) lastFinishReason = cand.finishReason;
        const piece = cand?.content?.parts?.[0]?.text || '';
        if (piece) {
          full += piece;
          onChunk(full);
        }
      }
    }

    if (!full) {
      if (blockReason) throw new Error(`Resposta bloqueada: ${blockReason}`);
      throw new Error(`Resposta vazia (finishReason: ${lastFinishReason || 'desconhecido'})`);
    }
    return { full, interactionId };
  }

  // Esconde o token de escalação durante o streaming pra não vazar.
  function stripMarker(s) {
    return s.replace(/\[NAO_ENCONTREI\]/g, '');
  }

  /* ---------------- Chat rendering ---------------- */
  function renderMessages() {
    const root = document.getElementById('chat-messages');
    root.innerHTML = messages.map(renderMessageHtml).join('');
    bindMessageHandlers();
    applyFeedbackGate();
    scrollToBottom();
  }

  /* Gate de feedback: usuário precisa avaliar a última resposta da Zi antes
     de mandar próxima pergunta. Retorna id da msg pendente, ou null. */
  function pendingFeedbackId() {
    for (let i = messages.length - 1; i >= 0; i--) {
      const m = messages[i];
      if (m.isAiAnswer && !m.feedback) return m.id;
      if (m.isAiAnswer && m.feedback) return null; // última AI já avaliada
    }
    return null;
  }

  function applyFeedbackGate() {
    const gated = !!pendingFeedbackId();
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    if (!input || !sendBtn) return;
    if (gated && !isWaitingReply) {
      input.disabled = true;
      input.placeholder = 'Avalie a resposta acima pra continuar…';
      sendBtn.disabled = true;
    } else if (!isWaitingReply) {
      input.disabled = false;
      input.placeholder = 'Pergunte qualquer coisa pra Zi…';
      sendBtn.disabled = false;
    }
  }

  function renderMessageHtml(m) {
    if (m.type === 'typing') {
      return `
        <div class="msg-block">
          <div class="msg-row assistant" data-id="${m.id}">
            <span class="avatar-slot">${ziAvatar(30)}</span>
            <div class="bubble">
              <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
            </div>
          </div>
        </div>
      `;
    }

    if (m.type === 'streaming') {
      return `
        <div class="msg-block">
          <div class="msg-row assistant" data-id="${m.id}">
            <span class="avatar-slot">${ziAvatar(30)}</span>
            <div class="bubble">${renderInline(m.content)}<span class="cursor"></span></div>
          </div>
        </div>
      `;
    }

    const isUser = m.role === 'user';
    const avatar = isUser ? '' : `<span class="avatar-slot">${ziAvatar(30)}</span>`;

    let extra = '';
    if (m.type === 'escalate-prompt') {
      extra = `
        <div class="escalation-actions">
          <button class="btn btn-primary" data-action="open-escalate" data-id="${m.id}">Sim, encaminhar</button>
          <button class="btn btn-secondary" data-action="dismiss-escalate" data-id="${m.id}">Não, obrigado</button>
        </div>
      `;
    } else if (m.type === 'escalate-form') {
      extra = `
        <form class="escalation-form" data-action="submit-escalate" data-id="${m.id}" novalidate>
          <div>
            <label for="esc-name-${m.id}">Seu nome (opcional)</label>
            <input id="esc-name-${m.id}" type="text" autocomplete="name" placeholder="Como o RH deve te chamar?">
          </div>
          <div>
            <label for="esc-email-${m.id}">E-mail (opcional)</label>
            <input id="esc-email-${m.id}" type="email" autocomplete="email" placeholder="pra te avisar quando tiver resposta">
          </div>
          <div class="row">
            <button type="button" class="btn btn-secondary" data-action="cancel-escalate" data-id="${m.id}">Cancelar</button>
            <button type="submit" class="btn btn-primary">Enviar pro RH</button>
          </div>
        </form>
      `;
    }

    // Botões de feedback só em respostas reais da Zi (não no welcome, escalações, erros)
    let feedbackHtml = '';
    if (m.isAiAnswer && !isUser) {
      // Antes do clique: dois botões. Depois do clique: só o escolhido fica visível, com tint terracota.
      if (!m.feedback) {
        const isGate = m.id === pendingFeedbackId();
        const gateClass = isGate ? ' feedback-required' : '';
        const gateHint = isGate ? `<div class="feedback-hint">Avalie a resposta pra continuar a conversa</div>` : '';
        feedbackHtml = `
          <div class="feedback${gateClass}">
            ${gateHint}
            <button class="fb-btn" data-action="feedback" data-rating="up"   data-id="${m.id}" aria-pressed="false" aria-label="Gostei">
              <span class="fb-emoji">👍</span><span class="fb-label">Gostei</span>
            </button>
            <button class="fb-btn" data-action="feedback" data-rating="down" data-id="${m.id}" aria-pressed="false" aria-label="Pode melhorar">
              <span class="fb-emoji">👎</span><span class="fb-label">Pode melhorar</span>
            </button>
          </div>
        `;
      } else {
        const isUp = m.feedback === 'up';
        const showCommentForm = !isUp && !m.commentSubmitted;
        feedbackHtml = `
          <div class="feedback">
            <button class="fb-btn" aria-pressed="true" disabled aria-label="${isUp ? 'Gostou' : 'Pode melhorar'}">
              <span class="fb-emoji">${isUp ? '👍' : '👎'}</span><span class="fb-label">${isUp ? 'Gostei' : 'Pode melhorar'}</span>
            </button>
          </div>
          ${showCommentForm ? `
            <div class="fb-comment" data-fb-comment="${m.id}">
              <div class="fb-comment-label">O que faltou na resposta? <span style="color:var(--nv-coffee-mute);font-weight:400;">(opcional — ajuda muito a Zi a aprender)</span></div>
              <textarea id="fb-comment-${m.id}" placeholder="Ex: a resposta foi vaga, não cobriu loja, falta o valor exato…"></textarea>
              <div class="fb-comment-actions">
                <button class="btn btn-ghost" data-action="skip-fb-comment" data-id="${m.id}">Pular</button>
                <button class="btn btn-primary" data-action="submit-fb-comment" data-id="${m.id}">Enviar</button>
              </div>
            </div>
          ` : ''}
        `;
      }
    }

    return `
      <div class="msg-block">
        <div class="msg-row ${isUser ? 'user' : 'assistant'}" data-id="${m.id}">
          ${avatar}
          <div class="bubble">${renderInline(m.content)}${extra}</div>
        </div>
        ${feedbackHtml}
      </div>
    `;
  }

  function bindMessageHandlers() {
    document.querySelectorAll('[data-action="open-escalate"]').forEach(btn => {
      btn.onclick = () => openEscalateForm(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="dismiss-escalate"]').forEach(btn => {
      btn.onclick = () => dismissEscalate(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="cancel-escalate"]').forEach(btn => {
      btn.onclick = () => cancelEscalateForm(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="submit-escalate"]').forEach(form => {
      form.onsubmit = (e) => {
        e.preventDefault();
        submitEscalation(form.dataset.id);
      };
    });
    document.querySelectorAll('[data-action="feedback"]').forEach(btn => {
      btn.onclick = () => submitFeedback(btn.dataset.id, btn.dataset.rating);
    });
    document.querySelectorAll('[data-action="submit-fb-comment"]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const ta = document.getElementById(`fb-comment-${id}`);
        submitFeedbackComment(id, (ta?.value || '').trim());
      };
    });
    document.querySelectorAll('[data-action="skip-fb-comment"]').forEach(btn => {
      btn.onclick = () => submitFeedbackComment(btn.dataset.id, '');
    });
  }

  async function submitFeedbackComment(messageId, comment) {
    const i = messages.findIndex(m => m.id === messageId);
    if (i === -1) return;
    const msg = messages[i];
    if (!msg.interactionId || msg.feedback !== 'down') return;

    // Marca como enviado antes do request pra esconder o form imediatamente
    messages[i].commentSubmitted = true;
    renderMessages();

    if (!comment) return; // skip: nada a salvar no servidor além do rating já enviado

    try {
      await apiPost('feedback', {
        interactionId: msg.interactionId,
        rating: -1,
        comment,
      });
      toast('Valeu! Comentário enviado ✨');
    } catch (err) {
      console.error('[Zi] feedback comment falhou:', err);
      toast('Não rolou registrar o comentário 😬');
    }
  }

  async function submitFeedback(messageId, rating) {
    const i = messages.findIndex(m => m.id === messageId);
    if (i === -1 || messages[i].feedback) return;
    const msg = messages[i];
    if (!msg.interactionId) {
      console.warn('feedback sem interactionId — provavelmente mensagem de erro/escalação');
      toast('Esse não dá pra avaliar');
      return;
    }
    const apiRating = rating === 'up' ? 1 : -1;

    // Otimista: trava o botão imediatamente
    messages[i].feedback = rating;
    renderMessages();

    try {
      await apiPost('feedback', { interactionId: msg.interactionId, rating: apiRating });
      toast(rating === 'up' ? 'Valeu pelo feedback! ✨' : 'Anotado, vamos melhorar 🙏');
      // foca o input pra fluir a próxima pergunta
      const input = document.getElementById('chat-input');
      if (input) input.focus();
    } catch (err) {
      console.error('[Zi] feedback falhou:', err);
      messages[i].feedback = null;       // desfaz o otimismo
      renderMessages();
      toast('Não rolou registrar 😬');
    }
  }

  function scrollToBottom() {
    // espera o paint
    requestAnimationFrame(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
  }

  function pushMessage(role, content, opts = {}) {
    const msg = {
      id: uidStr(),
      role,
      content,
      type: opts.type || 'regular',
      data: opts.data || null,
    };
    messages.push(msg);
    renderMessages();
    return msg;
  }

  function updateMessage(id, patch) {
    const i = messages.findIndex(m => m.id === id);
    if (i === -1) return;
    messages[i] = { ...messages[i], ...patch };
    renderMessages();
  }

  function removeMessage(id) {
    messages = messages.filter(m => m.id !== id);
    renderMessages();
  }

  /* ---------------- Suggestions ---------------- */
  function renderSuggestions() {
    const el = document.getElementById('suggestions');
    const hasUserMsg = messages.some(m => m.role === 'user');
    if (hasUserMsg) { el.innerHTML = ''; return; }

    el.innerHTML = `
      <div class="suggestions-label">Sugestões pra começar</div>
      ${SUGGESTIONS.map(s => `<button class="chip" data-suggestion="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('')}
    `;
    el.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = () => {
        const text = chip.getAttribute('data-suggestion');
        sendUserMessage(text);
      };
    });
  }

  /* ---------------- Chat actions ---------------- */
  async function sendUserMessage(text) {
    text = (text || '').trim();
    if (!text || isWaitingReply) return;

    // Gate: precisa avaliar a última resposta antes de mandar próxima pergunta
    if (pendingFeedbackId()) {
      toast('Antes da próxima pergunta, conta pra Zi se a resposta ajudou 👇', { soft: true, duration: 3000 });
      const el = document.querySelector('.feedback.feedback-required');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.remove('shake'); // reinicia animação se já tava aplicada
        void el.offsetWidth;           // força reflow pro restart da animation
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('shake'), 500);
      }
      return;
    }

    pushMessage('user', text);
    renderSuggestions(); // hides chips after first msg
    document.getElementById('chat-input').value = '';
    autoResizeInput();

    isWaitingReply = true;
    setSendEnabled(false);
    const typing = pushMessage('assistant', '', { type: 'typing' });

    let streamStarted = false;

    const onChunk = (full) => {
      const display = stripMarker(full);
      if (!streamStarted) {
        streamStarted = true;
        // Troca a bolha de "typing dots" pra "streaming" — full re-render (1x)
        updateMessage(typing.id, { type: 'streaming', content: display });
      } else {
        // Atualizações subsequentes — só mexe na innerHTML da bolha, sem re-render
        const i = messages.findIndex(m => m.id === typing.id);
        if (i !== -1) messages[i].content = display;
        const bubble = document.querySelector(`.msg-row[data-id="${typing.id}"] .bubble`);
        if (bubble) {
          bubble.innerHTML = renderInline(display) + '<span class="cursor"></span>';
        }
        // Auto-scroll só se o usuário já estava perto do fundo (não rouba scroll de quem subiu)
        if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 200) {
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'auto' });
        }
      }
    };

    try {
      const { full, interactionId } = await callChat(messages, onChunk);

      const isUnknown = full.includes('[NAO_ENCONTREI]');

      // Salva a resposta final em zi_interactions (fire-and-forget)
      if (interactionId) {
        apiPost('save_answer', {
          interactionId,
          answer: isUnknown ? '[NAO_ENCONTREI]' : full,
        }).catch(e => console.warn('save_answer falhou:', e));
      }

      if (isUnknown) {
        updateMessage(typing.id, {
          type: 'escalate-prompt',
          content: "Hmm, essa eu não consigo responder com clareza. 🤔\n\nQuer que eu encaminhe pro time de RH responder pessoalmente?",
          data: { originalQuestion: text, interactionId },
          isAiAnswer: false,
        });
      } else {
        updateMessage(typing.id, {
          type: 'regular',
          content: full,
          isAiAnswer: true,
          interactionId,
        });
      }
    } catch (err) {
      console.error('[Zi] Erro Gemini:', err);
      const detail = (err && err.message) ? err.message : String(err);
      updateMessage(typing.id, {
        type: 'regular',
        content: 'Ih, deu um erro na conexão com a IA 😬\n\n**Detalhe técnico:** ' + detail +
                 '\n\n(Abra o console do navegador — F12 → Console — pra ver o erro completo.)',
        isAiAnswer: false,
      });
    } finally {
      isWaitingReply = false;
      setSendEnabled(true);
      applyFeedbackGate(); // pode ter destravado streaming mas ativado o gate de feedback
      document.getElementById('chat-input').focus();
    }
  }

  function openEscalateForm(messageId) {
    const m = messages.find(x => x.id === messageId);
    if (!m) return;
    updateMessage(messageId, { type: 'escalate-form' });
    setTimeout(() => {
      const input = document.getElementById(`esc-name-${messageId}`);
      if (input) input.focus();
    }, 50);
  }

  function cancelEscalateForm(messageId) {
    updateMessage(messageId, { type: 'escalate-prompt' });
  }

  function dismissEscalate(messageId) {
    updateMessage(messageId, {
      type: 'regular',
      content: 'Sem problema! Se mudar de ideia, é só perguntar de novo ou reformular a dúvida 👋',
      data: null
    });
  }

  async function submitEscalation(messageId) {
    const m = messages.find(x => x.id === messageId);
    if (!m) return;
    const interactionId = m.data?.interactionId;
    if (!interactionId) {
      toast('Erro: não consegui identificar a pergunta 😬');
      return;
    }
    const name = (document.getElementById(`esc-name-${messageId}`)?.value || '').trim();
    const email = (document.getElementById(`esc-email-${messageId}`)?.value || '').trim();

    try {
      await apiPost('escalate', { interactionId, name, email });
      pendingCount += 1;
      updateAdminBadge();
      updateMessage(messageId, {
        type: 'regular',
        content: 'Prontinho! Sua pergunta foi enviada pro RH ✅\n\nAssim que tiver resposta eu te aviso por aqui.',
        data: null
      });
    } catch (err) {
      console.error('[Zi] escalate falhou:', err);
      toast('Falhou ao enviar 😬 tenta de novo');
    }
  }

  /* ---------------- Input ---------------- */
  function autoResizeInput() {
    const t = document.getElementById('chat-input');
    t.style.height = 'auto';
    t.style.height = Math.min(t.scrollHeight, 140) + 'px';
  }

  function setSendEnabled(on) {
    document.getElementById('send-btn').disabled = !on;
  }

  /* ---------------- Admin ---------------- */
  function updateAdminBadge() {
    const badge = document.getElementById('admin-badge');
    if (pendingCount > 0) {
      badge.textContent = pendingCount;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }

  async function refreshPendingCount() {
    try {
      const r = await apiPost('pending_count');
      pendingCount = r.count || 0;
    } catch (e) {
      console.warn('pending_count falhou:', e);
      pendingCount = 0;
    }
    updateAdminBadge();
  }

  /* ---------- Auth (login + role) ---------- */
  function getAuth() {
    const raw = sessionStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }
  function isAuthenticated() { return !!getAuth(); }
  function isAdmin() { return getAuth()?.role === 'admin'; }
  // Root admin = login literal 'admin' (gestor do pilot). Outros admins (mariana,
  // waleska, etc.) são testers — não veem métricas de pilot dos colegas.
  function isRootAdmin() { return getAuth()?.username === 'admin'; }

  function tryLogin(username, password) {
    const c = CREDENTIALS[(username || '').trim().toLowerCase()];
    if (!c || c.password !== password) return null;
    const auth = { username: username.trim().toLowerCase(), password: c.password, role: c.role };
    sessionStorage.setItem(AUTH_KEY, JSON.stringify(auth));
    return auth;
  }

  function logout() {
    sessionStorage.removeItem(AUTH_KEY);
    sessionStorage.removeItem(SESSION_ID_KEY);
    window.location.reload();
  }

  // Estado do painel admin
  let adminPending = [];
  let adminTrained = [];
  let adminFeedback = [];
  let metricsData  = null;
  let pilotData    = null;                      // só populado se isRootAdmin()
  let kbState      = { files: null, status: {}, running: false, log: [] };
  let selectedUsernames = [];   // [] = todos; array com usernames = filtrados
  let filterPanelOpen = false;
  let adminSubTab = 'pending';                  // 'pending' | 'dashboard' | 'feedback' | 'trained' | 'pilot'
  let dashPeriod = 30;                          // 30 | 15 | 7
  let chartMetric = 'messages';                 // 'messages' | 'unique_users' | 'autonomous' | 'rated'
  let feedbackFilter = 'down';                  // 'down' (default) | 'up' | 'all'

  async function loadAdminData() {
    const auth = getAuth();
    if (!auth || auth.role !== 'admin') return;
    try {
      const [pending, trained, feedback, metrics] = await Promise.all([
        apiPost('admin_list_pending',  { auth }),
        apiPost('admin_list_trained',  { auth }),
        apiPost('admin_list_feedback', { auth }),
        apiPost('admin_metrics', {
          auth,
          period_days: dashPeriod,
          filter: { usernames: selectedUsernames.length ? selectedUsernames : null },
        }),
      ]);
      adminPending  = Array.isArray(pending)  ? pending  : [];
      adminTrained  = Array.isArray(trained)  ? trained  : [];
      adminFeedback = Array.isArray(feedback) ? feedback : [];
      metricsData   = metrics;
      pendingCount  = adminPending.length;
      updateAdminBadge();

      // Pilot data — só pro root admin (gestor do pilot)
      if (isRootAdmin()) {
        try {
          pilotData = await apiPost('admin_pilot', { auth, period_days: dashPeriod });
        } catch (e) {
          console.warn('[admin] pilot load falhou:', e);
          pilotData = null;
        }
      } else {
        pilotData = null;
      }
    } catch (e) {
      console.error('[admin] load falhou:', e);
      toast('Erro carregando admin — confere console');
    }
  }

  async function reloadMetricsOnly() {
    const auth = getAuth();
    if (!auth || auth.role !== 'admin') return;
    try {
      metricsData = await apiPost('admin_metrics', {
        auth,
        period_days: dashPeriod,
        filter: { usernames: selectedUsernames.length ? selectedUsernames : null },
      });
      const root = document.getElementById('metrics-root');
      if (root) root.innerHTML = renderMetricsHtml();
      bindMetricsHandlers();
    } catch (e) {
      console.error('[metrics] reload falhou:', e);
      toast('Erro carregando métricas');
    }
  }

  function renderAdmin() {
    const root = document.getElementById('admin-root');
    // O acesso ao painel admin já é garantido pelo login + role; sem gate extra aqui.
    if (!isAdmin()) {
      root.innerHTML = `<div class="empty-state">Acesso restrito ao time de RH.</div>`;
      return;
    }

    // Painel autenticado com sub-tabs
    const pendingBadge = pendingCount > 0 ? `<span class="subtab-badge">${pendingCount}</span>` : '';
    // Abas "Pilot" e "KB" só pro root admin (gestor do pilot, não os testers)
    const pilotTab = isRootAdmin()
      ? `<button class="subtab-btn ${adminSubTab === 'pilot' ? 'active' : ''}" data-subtab="pilot">Pilot</button>`
      : '';
    const kbTab = isRootAdmin()
      ? `<button class="subtab-btn ${adminSubTab === 'kb' ? 'active' : ''}" data-subtab="kb">KB</button>`
      : '';
    root.innerHTML = `
      <div class="subtabs" role="tablist">
        <button class="subtab-btn ${adminSubTab === 'pending'   ? 'active' : ''}" data-subtab="pending">Perguntas pendentes${pendingBadge}</button>
        <button class="subtab-btn ${adminSubTab === 'dashboard' ? 'active' : ''}" data-subtab="dashboard">Dashboard</button>
        <button class="subtab-btn ${adminSubTab === 'feedback'  ? 'active' : ''}" data-subtab="feedback">Feedback dos colaboradores</button>
        <button class="subtab-btn ${adminSubTab === 'trained'   ? 'active' : ''}" data-subtab="trained">Respostas treinadas</button>
        ${pilotTab}
        ${kbTab}
      </div>
      <div id="subtab-content">${renderSubTabContent()}</div>
      <div class="admin-footer">
        <button class="btn btn-ghost" id="admin-refresh">Atualizar</button>
        <button class="btn btn-ghost" id="admin-logout">Sair do admin</button>
      </div>
    `;
    bindAdminHandlers();
    bindSubTabHandlers();
    if (adminSubTab === 'dashboard') bindMetricsHandlers();
    if (adminSubTab === 'feedback')  bindFeedbackFilterHandlers();
    if (adminSubTab === 'pilot')     bindPilotHandlers();
    if (adminSubTab === 'kb')        bindKbHandlers();
  }

  function renderSubTabContent() {
    if (adminSubTab === 'pending') return `
      <section class="admin-section">
        <h2>Perguntas pendentes</h2>
        <p class="section-hint">Perguntas que a Zi não soube responder e foram escaladas pelos colaboradores. Responda aqui pra alimentar a base.</p>
        <div id="pending-list">${renderPendingHtml()}</div>
      </section>
    `;
    if (adminSubTab === 'dashboard') return `
      <section class="admin-section">
        <h2>Dashboard</h2>
        <p class="section-hint">Adoção, qualidade e impacto operacional da Zi. Clique em qualquer KPI pra trocar a métrica do gráfico.</p>
        <div id="metrics-root">${renderMetricsHtml()}</div>
      </section>
    `;
    if (adminSubTab === 'feedback') return `
      <section class="admin-section">
        <h2>Feedback dos colaboradores</h2>
        <p class="section-hint">👍 e 👎 dados nas respostas da Zi. Sinal pra identificar onde ela responde bem e onde precisa melhorar.</p>
        ${renderFeedbackFilterHtml()}
        <div id="feedback-list">${renderFeedbackHtml()}</div>
      </section>
    `;
    if (adminSubTab === 'trained') return `
      <section class="admin-section">
        <h2>Respostas treinadas</h2>
        <p class="section-hint">Respostas validadas pelo RH. A Zi usa essas como referência nas próximas conversas.</p>
        <div id="trained-list">${renderTrainedHtml()}</div>
      </section>
    `;
    if (adminSubTab === 'pilot' && isRootAdmin()) return `
      <section class="admin-section">
        <h2>Pilot — análise por usuário</h2>
        <p class="section-hint">Telemetria detalhada por colaborador testando a Zi: frequência, recência, retenção, tópicos e comentários. Visível só pra você.</p>
        <div id="pilot-root">${renderPilotHtml()}</div>
      </section>
    `;
    if (adminSubTab === 'kb' && isRootAdmin()) return `
      <section class="admin-section">
        <h2>Base de conhecimento — Reingestar</h2>
        <p class="section-hint">Reprocessa os documentos da KB: puxa do GitHub, gera embeddings via Gemini, regrava no Supabase. Use depois de adicionar ou editar arquivos em <code>kb/*.md</code>.</p>
        <div id="kb-root">${renderKbHtml()}</div>
      </section>
    `;
    return '';
  }

  function bindSubTabHandlers() {
    document.querySelectorAll('[data-subtab]').forEach(btn => {
      btn.onclick = () => {
        adminSubTab = btn.dataset.subtab;
        renderAdmin();
      };
    });
  }

  /* ---------------- Dashboard de métricas ---------------- */
  function renderMetricsHtml() {
    if (!metricsData) {
      return `<div class="empty-state">Carregando métricas…</div>`;
    }
    const m = metricsData;
    return `
      ${renderDashboardControlsHtml(m)}
      ${renderKpisHtml(m)}
      ${renderChartHtml(m)}
      ${renderSplitHtml(m)}
      ${renderSlaHtml(m)}
      ${renderEscalationsTableHtml(m)}
    `;
  }

  function renderDashboardControlsHtml(m) {
    return `
      <div class="metrics-bar">
        <span class="label">Período:</span>
        <div class="period-toggle" role="tablist">
          <button data-period="30" class="${dashPeriod === 30 ? 'active' : ''}">Últimos 30 dias</button>
          <button data-period="15" class="${dashPeriod === 15 ? 'active' : ''}">Últimos 15 dias</button>
          <button data-period="7"  class="${dashPeriod === 7  ? 'active' : ''}">Últimos 7 dias</button>
        </div>
        <span class="label">Filtrar por usuário:</span>
        ${renderFilterShellHtml(m)}
        ${m.total_interactions !== undefined
          ? `<span class="label" style="margin-left:auto;">Total: <strong>${m.total_interactions}</strong> interações no escopo</span>`
          : ''}
      </div>
    `;
  }

  function renderFilterShellHtml(m) {
    const opts = m.user_options || [];
    const identifiedCount = opts.filter(o => !o.is_anonymous).length;
    const allSelected = selectedUsernames.length === 0;
    const label = allSelected
      ? `Todos os usuários (${identifiedCount})`
      : `${selectedUsernames.length} selecionado${selectedUsernames.length !== 1 ? 's' : ''}`;
    return `
      <div class="filter-shell">
        <button class="filter-btn" id="filter-btn" type="button">
          <span>${escapeHtml(label)}</span>
          <span class="chev">▾</span>
        </button>
        <div class="filter-panel ${filterPanelOpen ? 'open' : ''}" id="filter-panel">
          <div class="filter-head">
            <button data-action="filter-all" type="button">Selecionar todos</button>
            <button data-action="filter-none" type="button">Limpar</button>
          </div>
          ${opts.length === 0
            ? `<div class="empty-state" style="padding:14px; font-size:12px;">Sem usuários no escopo.</div>`
            : opts.map(o => {
                const checked = selectedUsernames.includes(o.username) || allSelected;
                const who  = o.is_anonymous ? 'Anônimos (sem login)' : o.username;
                const meta = o.is_anonymous
                  ? `${o.messages} msg${o.messages !== 1 ? 's' : ''} · histórico pré-feature`
                  : `${o.messages} msg${o.messages !== 1 ? 's' : ''} · última atividade ${formatDate(o.last_at)}`;
                return `
                  <label class="filter-option">
                    <input type="checkbox" data-action="filter-toggle" data-uname="${escapeHtml(o.username)}" ${checked ? 'checked' : ''}>
                    <div>
                      <div>${escapeHtml(who)}</div>
                      <span class="opt-meta">${escapeHtml(meta)}</span>
                    </div>
                  </label>
                `;
              }).join('')
          }
        </div>
      </div>
    `;
  }

  function renderKpisHtml(m) {
    const k = m.kpis;
    const periodLabel = m.period_days === 30 ? 'no mês' : (m.period_days === 15 ? 'em 15 dias' : 'em 7 dias');
    const pctAuto = Math.round(k.autonomous_rate * 100);
    const tAuto = Math.round(k.targets.autonomous * 100);
    const autoMet = k.autonomous_rate >= k.targets.autonomous;
    const cls = (key) => `kpi ${chartMetric === key ? 'kpi--active' : 'kpi--inactive'}`;

    return `
      <div class="kpi-row">
        <div class="${cls('unique_users')}" data-metric="unique_users" title="Clique pra ver no gráfico">
          <div class="kpi-label">
            Usuários únicos ${periodLabel}
