<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <title>Zi · Assistente de RH NV</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ============================================================
       * Design tokens — alinhados ao STYLEGUIDE.md
       * Paleta minimalista editorial: preto + navy + branco + off-white
       * ============================================================ */

      /* === Surfaces === */
      --nv-paper:        #FFFFFF;     /* color-bg-main */
      --nv-cream:        #F5F5F3;     /* color-bg-surface (bolhas Zi, cards) */
      --nv-cream-deep:   #FAFAF8;     /* color-bg-elevated (gate, empty state) */
      --nv-surface:      #F5F5F3;     /* alias do bg-surface */

      /* === Ink === */
      --nv-coffee:       #1A1A1A;     /* color-brand-primary, texto, CTAs */
      --nv-coffee-soft:  #3D3D3D;     /* color-text-soft */
      --nv-coffee-mute:  #767676;     /* color-text-muted */

      /* === Borders === */
      --nv-line:         #E0DCD3;     /* color-border-subtle */
      --nv-line-strong:  #C9C2B4;     /* color-border-strong */

      /* === Accent: Navy NV ("Blue Matters") — usado APENAS em conteúdo
       *   (bolhas user, links, focus, ícones). Estrutura é preto. */
      --nv-blue:         #1B365D;     /* color-brand-accent */
      --nv-blue-deep:    #0F2238;
      --nv-blue-soft:    #E4EAF2;     /* color-accent-soft */
      --nv-blue-tint:    #B3C0D2;

      /* === Legado: terracotta — em uso apenas no badge de pendentes.
       *   Não usar em novas superfícies (vide STYLEGUIDE.md §13). */
      --nv-clay:         #C9805A;
      --nv-clay-dark:    #A35A3B;
      --nv-clay-light:   #F5E3D8;

      /* === Semantic === */
      --nv-success:      #1F6B47;
      --nv-success-soft: #DCE9E1;
      --nv-danger:       #8B2E26;
      --nv-danger-soft:  #F2DDD9;

      /* === Radii === */
      --radius-xs:       4px;
      --radius-sm:       6px;
      --radius-md:       10px;
      --radius-lg:       14px;
      --radius-bubble:   14px;
      --radius-card:     12px;
      --radius-pill:     999px;

      /* === Elevations === */
      --shadow-xs:       0 1px 2px rgba(0,0,0,0.04);
      --shadow-sm:       0 2px 8px rgba(0,0,0,0.05);
      --shadow-md:       0 8px 24px rgba(0,0,0,0.08);
      --shadow-lg:       0 20px 48px rgba(0,0,0,0.12);

      /* === Motion === */
      --ease-soft:       cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-spring:     cubic-bezier(0.34, 1.4, 0.5, 1);
      --dur-fast:        140ms;
      --dur-base:        220ms;
      --dur-slow:        350ms;

      /* === Layout === */
      --max-w:           860px;

      /* === Typography (Inter universal) === */
      --font-display:    'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body:       'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--nv-paper);
      color: var(--nv-coffee);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss01", "cv11";
    }

    /* Accessibility: respeita o usuário */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    :focus-visible {
      outline: 2px solid var(--nv-blue);
      outline-offset: 2px;
      border-radius: var(--radius-xs);
    }

    /* ---------- Header ---------- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.84);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--nv-line);
      padding: 16px 24px;
    }
    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-id {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1 1 240px;
    }
    .header-text { min-width: 0; }
    .header-text h1 {
      margin: 0;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 24px;
      line-height: 1.2;
      color: var(--nv-coffee);
      letter-spacing: -0.4px;
    }
    .header-text p {
      margin: 3px 0 0 0;
      font-size: 13px;
      color: var(--nv-coffee-mute);
      letter-spacing: 0.1px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--nv-cream);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-pill);
      padding: 4px;
    }
    .tab-btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--nv-coffee-soft);
      background: transparent;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 8px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: color var(--dur-fast) var(--ease-soft),
                  background var(--dur-base) var(--ease-soft);
      letter-spacing: 0.1px;
    }
    .tab-btn:hover { color: var(--nv-coffee); }
    .tab-btn.active {
      background: var(--nv-coffee);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .badge {
      display: inline-block;
      min-width: 18px;
      padding: 0 6px;
      height: 18px;
      line-height: 18px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border-radius: var(--radius-pill);
      background: var(--nv-blue);
      color: white;
      letter-spacing: 0;
    }
    .tab-btn.active .badge { background: white; color: var(--nv-coffee); }

    /* ---------- Views ---------- */
    .view { display: none; }
    .view.active { display: block; }
    .view-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 24px 20px 32px 20px;
    }

    /* ---------- Chat ---------- */
    .messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 8px;
    }
    .msg-block {
      display: flex;
      flex-direction: column;
      animation: msg-enter var(--dur-base) var(--ease-soft);
    }
    @keyframes msg-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 100%;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(78%, 620px);
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.55;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-shadow: var(--shadow-xs);
      letter-spacing: 0.1px;
    }
    .bubble strong { font-weight: 600; }
    .bubble a {
      color: var(--nv-blue);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
      transition: color var(--dur-fast) var(--ease-soft);
    }
    .bubble a:hover { color: var(--nv-blue-deep); }
    .msg-row.user .bubble a { color: inherit; text-decoration-color: rgba(255,255,255,0.5); }

    .msg-row.user .bubble {
      background: var(--nv-blue);
      color: white;
      border-radius: var(--radius-bubble) var(--radius-bubble) 4px var(--radius-bubble);
    }
    .msg-row.assistant .bubble {
      background: var(--nv-surface);
      color: var(--nv-coffee);
      border: 1px solid var(--nv-line);
      border-radius: 4px var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
    }

    .msg-row .avatar-slot {
      flex-shrink: 0;
      align-self: flex-end;
    }

    /* typing */
    .typing { display: inline-flex; gap: 5px; padding: 6px 2px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      background: var(--nv-coffee-soft);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.3s var(--ease-soft) infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: translateY(0) scale(0.85); }
      50%      { opacity: 1;    transform: translateY(-2px) scale(1); }
    }

    /* escalation */
    .escalation-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      padding: 10px 18px;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-soft),
                  color var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft);
      line-height: 1.2;
      letter-spacing: 0.1px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--nv-coffee);
      color: white;
      box-shadow: var(--shadow-xs);
    }
    .btn-primary:hover { background: #000000; box-shadow: var(--shadow-sm); }
    .btn-secondary {
      background: var(--nv-surface);
      color: var(--nv-coffee);
      border-color: var(--nv-line);
    }
    .btn-secondary:hover {
      background: var(--nv-cream);
      border-color: var(--nv-line-strong);
    }
    .btn-ghost {
      background: transparent;
      color: var(--nv-coffee-soft);
      border-color: transparent;
      padding: 7px 10px;
      font-size: 13px;
    }
    .btn-ghost:hover { color: var(--nv-blue); background: var(--nv-blue-soft); }

    .escalation-form {
      margin-top: 14px;
      padding: 14px;
      background: var(--nv-paper);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .escalation-form label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--nv-coffee-soft);
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }
    .escalation-form input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-sm);
      background: var(--nv-surface);
      color: var(--nv-coffee);
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft);
    }
    .escalation-form input:focus {
      outline: none;
      border-color: var(--nv-blue);
      box-shadow: 0 0 0 3px var(--nv-blue-soft);
    }
    .escalation-form .row { display: flex; justify-content: flex-end; gap: 8px; }

    /* suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
      padding-bottom: 4px;
    }
    .suggestions-label {
      width: 100%;
      font-size: 11px;
      font-weight: 500;
      color: var(--nv-coffee-mute);
      margin-bottom: 4px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .chip {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 450;
      color: var(--nv-coffee);
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      padding: 9px 16px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft);
    }
    .chip:hover {
      background: var(--nv-blue-soft);
      border-color: var(--nv-blue);
      transform: translateY(-1px);
    }
    .chip:active { transform: translateY(0); }

    /* input bar */
    .input-bar-wrap {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to bottom, rgba(251,248,243,0) 0%, var(--nv-paper) 28%);
      padding: 22px 24px 18px 24px;
      z-index: 10;
    }
    .input-bar {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-base) var(--ease-soft);
    }
    .input-bar:focus-within {
      border-color: var(--nv-blue);
      box-shadow: 0 0 0 3px var(--nv-blue-soft), var(--shadow-sm);
    }
    #chat-input {
      flex: 1;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      color: var(--nv-coffee);
      background: transparent;
      border: 0;
      outline: none;
      resize: none;
      max-height: 140px;
      padding: 8px 4px;
      letter-spacing: 0.1px;
    }
    #chat-input::placeholder { color: var(--nv-coffee-mute); }
    #send-btn {
      flex-shrink: 0;
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      background: var(--nv-coffee);
      color: white;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-soft);
    }
    #send-btn:hover:not(:disabled) { background: #000000; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { background: var(--nv-line-strong); cursor: not-allowed; opacity: 0.6; }

    /* ---------- Admin ---------- */
    .admin-section { margin-bottom: 44px; }
    .admin-section h2 {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 22px;
      letter-spacing: -0.3px;
      color: var(--nv-coffee);
      margin: 0 0 6px 0;
    }
    .admin-section .section-hint {
      font-size: 14px;
      color: var(--nv-coffee-soft);
      margin: 0 0 20px 0;
      line-height: 1.5;
      max-width: 60ch;
    }
    .empty-state {
      padding: 32px 24px;
      background: var(--nv-cream);
      border: 1px dashed var(--nv-line-strong);
      border-radius: var(--radius-card);
      text-align: center;
      color: var(--nv-coffee-soft);
      font-size: 14px;
    }
    .card {
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-xs);
      transition: box-shadow var(--dur-base) var(--ease-soft),
                  border-color var(--dur-base) var(--ease-soft);
    }
    .card:hover { box-shadow: var(--shadow-sm); }
    .card-trained {
      border-left: 3px solid var(--nv-blue);
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      font-size: 12px;
      color: var(--nv-coffee-soft);
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }
    .card-meta .meta-name { font-weight: 600; color: var(--nv-coffee); }
    .card-question {
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 500;
      font-size: 16px;
      color: var(--nv-coffee);
      margin: 0 0 14px 0;
      line-height: 1.45;
      letter-spacing: -0.2px;
    }
    .card-answer {
      color: var(--nv-coffee);
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .card textarea {
      width: 100%;
      min-height: 110px;
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.55;
      padding: 12px 14px;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-sm);
      background: var(--nv-paper);
      color: var(--nv-coffee);
      resize: vertical;
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft),
                  background var(--dur-fast) var(--ease-soft);
    }
    .card textarea:focus {
      outline: none;
      border-color: var(--nv-blue);
      background: var(--nv-surface);
      box-shadow: 0 0 0 3px var(--nv-blue-soft);
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    /* ---------- Footer ---------- */
    .app-footer {
      text-align: center;
      font-size: 11px;
      color: var(--nv-coffee-mute);
      padding: 14px 20px 22px 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ---------- Toast ---------- */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--nv-coffee);
      color: var(--nv-paper);
      padding: 11px 20px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease-soft),
                  transform var(--dur-base) var(--ease-spring);
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---------- Streaming cursor ---------- */
    .cursor {
      display: inline-block;
      width: 6px;
      height: 1em;
      background: var(--nv-blue);
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: cursor-blink 0.9s steps(2) infinite;
      opacity: 0.85;
      border-radius: 1px;
    }
    @keyframes cursor-blink { 50% { opacity: 0; } }

    /* ---------- Feedback (👍 / 👎) ---------- */
    .feedback {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      margin-left: 40px;
    }
    .fb-btn {
      background: transparent;
      border: 1px solid transparent;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      opacity: 0.4;
      transition: opacity var(--dur-fast) var(--ease-soft),
                  background var(--dur-fast) var(--ease-soft),
                  border-color var(--dur-fast) var(--ease-soft),
                  transform var(--dur-fast) var(--ease-spring);
      line-height: 1;
      font-family: var(--font-body);
    }
    .fb-btn:hover:not(:disabled) {
      opacity: 1;
      background: var(--nv-surface);
      border-color: var(--nv-line);
      transform: scale(1.08);
    }
    .fb-btn[aria-pressed="true"] {
      opacity: 1;
      background: var(--nv-blue-soft);
      border-color: var(--nv-blue);
      transform: scale(1);
    }
    .fb-btn:disabled { cursor: default; }

    /* ---------- Admin gate (PIN) ---------- */
    .admin-gate {
      max-width: 380px;
      margin: 56px auto;
      text-align: center;
      padding: 40px 32px;
      background: var(--nv-surface);
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
    }
    .admin-gate h2 {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 22px;
      letter-spacing: -0.3px;
      margin: 0 0 8px 0;
      color: var(--nv-coffee);
    }
    .admin-gate p {
      font-size: 14px;
      color: var(--nv-coffee-soft);
      margin: 0 0 24px 0;
      line-height: 1.55;
    }
    .admin-gate input {
      width: 100%;
      text-align: center;
      letter-spacing: 4px;
      font-size: 18px;
      font-family: var(--font-body);
      font-weight: 500;
      padding: 14px 16px;
      border: 1px solid var(--nv-line);
      border-radius: var(--radius-sm);
      background: var(--nv-paper);
      color: var(--nv-coffee);
      margin-bottom: 14px;
      transition: border-color var(--dur-fast) var(--ease-soft),
                  box-shadow var(--dur-fast) var(--ease-soft);
    }
    .admin-gate input:focus {
      outline: none;
      border-color: var(--nv-blue);
      box-shadow: 0 0 0 3px var(--nv-blue-soft);
    }
    .admin-gate .btn { width: 100%; padding: 12px; font-size: 15px; }
    .admin-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding-top: 20px;
      margin-top: 32px;
      border-top: 1px solid var(--nv-line);
    }

    /* ---------- Feedback cards no admin ---------- */
    .card-feedback { border-left: 3px solid var(--nv-coffee-mute); }
    .card-feedback.card-fb-up   { border-left-color: var(--nv-success); }
    .card-feedback.card-fb-down { border-left-color: var(--nv-danger); }
    .rating-badge {
      display: inline-flex;

    /* ---------- Mobile ---------- */
    @media (max-width: 560px) {

      .header-text h1 { font-size: 22px; }

  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-id">
        <span id="header-avatar"></span>
        <div class="header-text">
          <h1>Zi · Assistente de RH</h1>
          <p>O jeito mais rápido de tirar suas dúvidas com o RH.</p>
        </div>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab-btn active" data-view="chat" role="tab" aria-selected="true">Conversar</button>
        <button class="tab-btn" data-view="admin" role="tab" aria-selected="false">
          Admin RH <span id="admin-badge" class="badge" style="display:none">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Chat view -->
  <main id="view-chat" class="view active">
    <div class="view-inner">
      <div id="chat-messages" class="messages" aria-live="polite"></div>
      <div id="suggestions" class="suggestions"></div>
    </div>
    <div class="input-bar-wrap">
      <div class="input-bar">
        <textarea id="chat-input" rows="1" placeholder="Pergunte qualquer coisa pra Zi…" autocomplete="off"></textarea>
        <button id="send-btn" aria-label="Enviar mensagem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Admin view (conteúdo gerado em JS — gate ou painel) -->
  <main id="view-admin" class="view">
    <div class="view-inner" id="admin-root"></div>
  </main>

  <footer class="app-footer">NV · Assistente interna de RH</footer>

  <div id="toast" class="toast" role="status"></div>

  <script>
  /* =====================================================
   * Zi · Chatbot RH NV — Protótipo (single-file)
   * ===================================================== */

  // Toda a comunicação passa pela edge function /api/zi (Netlify).
  // Ela faz: retrieval no Supabase (pgvector) → Gemini stream → persistência
  // (zi_interactions, zi_trained_answers). KB e respostas treinadas vivem
  // no Supabase — o cliente não conhece nada disso.
  const API_URL = "/api/zi";

  // PIN do Admin RH — fricção simples, não segurança. Validado também no servidor.
  const ADMIN_PIN = "NVRH2026";
  const ADMIN_AUTH_KEY = "zi_admin_auth";
  const SESSION_ID_KEY = "zi_session_id";

  const SUGGESTIONS = [
    "Como funciona o vale-refeição?",
    "Quantos dias de licença paternidade eu tenho?",
    "Posso continuar com o plano de saúde depois que sair?",
    "Como solicito férias?",
    "Como incluir minha esposa no plano?",
  ];

  const WELCOME_TEXT =
    "Oi! Eu sou a **Zi**, sua assistente do RH da NV ✨\n\n" +
    "Pode mandar sua dúvida — admissão, benefícios, férias, plano de saúde, segurança da informação… o que rolar. " +
    "Respondo na hora com base nas nossas políticas.";

  /* ---------------- Base de Conhecimento (REMOVIDA) ----------------
   * Antes era um template literal de ~200 linhas no client. Agora vive
   * no Supabase (tabela kb_chunks) e é recuperada pela edge function via
   * embedding + match_kb_chunks. Veja netlify/edge-functions/zi.js e kb/.
   * ----------------------------------------------------------------- */


  /* ---------------- Avatar (foto real da Zilaide) ----------------
   * Foto profissional servida de assets/zi-avatar.jpg.
   * Spec: STYLEGUIDE.md §9. Substituir foto: trocar o arquivo,
   * manter aspect 1:1 e mín. 512px (renderiza em retina @64).
   * ---------------------------------------------------------------- */
  function ziAvatar(size = 40, ring = false) {
    const ringStyle = ring
      ? 'box-shadow: 0 0 0 2px var(--nv-paper), 0 0 0 3px var(--nv-line);'
      : '';
    const style = [
      `width:${size}px`,
      `height:${size}px`,
      'border-radius:50%',
      'object-fit:cover',
      'object-position:50% 22%',  // mantém o rosto centralizado depois do crop circular
      'display:block',
      'flex-shrink:0',
      ringStyle,
    ].filter(Boolean).join('; ');
    return `<img src="assets/zi-avatar.jpg" width="${size}" height="${size}" alt="Zi" loading="lazy" style="${style}" />`;
  }

  /* ---------------- Helpers ---------------- */
  function uidStr() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function nowISO() { return new Date().toISOString(); }

  function formatDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('pt-BR', { day: '2-digit', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }

  /* ---------------- API client (edge function /api/zi) ---------------- */
  function getSessionId() {
    let id = sessionStorage.getItem(SESSION_ID_KEY);
    if (!id) {
      id = (crypto.randomUUID?.() || uidStr() + uidStr());
      sessionStorage.setItem(SESSION_ID_KEY, id);
    }
    return id;
  }

  async function apiPost(action, payload = {}) {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...payload }),
    });
    if (!resp.ok) {
      const text = await resp.text().catch(() => '');
      let detail = text;
      try { detail = JSON.parse(text)?.error?.message || text; } catch {}
      throw new Error(`${action} HTTP ${resp.status}: ${detail.slice(0, 300)}`);
    }
    return resp.json();
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ** ** -> <strong>, URLs -> <a>, newlines -> <br>
  function renderInline(text) {
    let s = escapeHtml(text);
    // bold
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // auto-link URLs
    s = s.replace(/(https?:\/\/[^\s<]+[^\s<.,;:!?)])/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // newlines
    s = s.replace(/\n/g, '<br>');
    return s;
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  /* ---------------- State ---------------- */
  let messages = [
    { id: uidStr(), role: 'assistant', content: WELCOME_TEXT, type: 'regular' }
  ];
  let pendingCount = 0;          // populado por refreshPendingCount()
  let currentView = 'chat';
  let isWaitingReply = false;

  /* ---------------- Chat streaming via edge function ---------------- */

  // Envia o histórico atual (incluindo a mensagem do user que acabou de chegar)
  // pra /api/zi. Edge function: embed → match_kb_chunks (Supabase) → Gemini stream.
  // Retorna { full, interactionId }. onChunk(textoAcumulado) chamado a cada delta.
  async function callChat(history, onChunk) {
    const payloadMessages = history
      .filter(m => m.type !== 'typing' && m.type !== 'streaming')
      .filter(m => m.role === 'user' || m.role === 'assistant')
      .map(m => ({ role: m.role, content: m.content }));

    // Pula a 1ª mensagem se for boas-vindas do assistente — Gemini exige user no início
    if (payloadMessages.length && payloadMessages[0].role === 'assistant') {
      payloadMessages.shift();
    }

    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'chat',
        messages: payloadMessages,
        session_id: getSessionId(),
      }),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status} — ${errText.slice(0, 400)}`);
    }

    const interactionId = resp.headers.get('X-Interaction-Id') || null;

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let full = '';
    let lastFinishReason = null;
    let blockReason = null;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let nl;
      while ((nl = buffer.indexOf('\n')) >= 0) {
        const line = buffer.slice(0, nl).trim();
        buffer = buffer.slice(nl + 1);
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (!payload) continue;

        let obj;
        try { obj = JSON.parse(payload); } catch { continue; }

        if (obj.error) {
          throw new Error(`Stream error: ${JSON.stringify(obj.error).slice(0, 300)}`);
        }
        if (obj.promptFeedback?.blockReason) blockReason = obj.promptFeedback.blockReason;

        const cand = obj.candidates?.[0];
        if (cand?.finishReason) lastFinishReason = cand.finishReason;
        const piece = cand?.content?.parts?.[0]?.text || '';
        if (piece) {
          full += piece;
          onChunk(full);
        }
      }
    }

    if (!full) {
      if (blockReason) throw new Error(`Resposta bloqueada: ${blockReason}`);
      throw new Error(`Resposta vazia (finishReason: ${lastFinishReason || 'desconhecido'})`);
    }
    return { full, interactionId };
  }

  // Esconde o token de escalação durante o streaming pra não vazar.
  function stripMarker(s) {
    return s.replace(/\[NAO_ENCONTREI\]/g, '');
  }

  /* ---------------- Chat rendering ---------------- */
  function renderMessages() {
    const root = document.getElementById('chat-messages');
    root.innerHTML = messages.map(renderMessageHtml).join('');
    bindMessageHandlers();
    scrollToBottom();
  }

  function renderMessageHtml(m) {
    if (m.type === 'typing') {
      return `
        <div class="msg-block">
          <div class="msg-row assistant" data-id="${m.id}">
            <span class="avatar-slot">${ziAvatar(30)}</span>
            <div class="bubble">
              <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
            </div>
          </div>
        </div>
      `;
    }

    if (m.type === 'streaming') {
      return `
        <div class="msg-block">
          <div class="msg-row assistant" data-id="${m.id}">
            <span class="avatar-slot">${ziAvatar(30)}</span>
            <div class="bubble">${renderInline(m.content)}<span class="cursor"></span></div>
          </div>
        </div>
      `;
    }

    const isUser = m.role === 'user';
    const avatar = isUser ? '' : `<span class="avatar-slot">${ziAvatar(30)}</span>`;

    let extra = '';
    if (m.type === 'escalate-prompt') {
      extra = `
        <div class="escalation-actions">
          <button class="btn btn-primary" data-action="open-escalate" data-id="${m.id}">Sim, encaminhar</button>
          <button class="btn btn-secondary" data-action="dismiss-escalate" data-id="${m.id}">Não, obrigado</button>
        </div>
      `;
    } else if (m.type === 'escalate-form') {
      extra = `
        <form class="escalation-form" data-action="submit-escalate" data-id="${m.id}" novalidate>
          <div>
            <label for="esc-name-${m.id}">Seu nome (opcional)</label>
            <input id="esc-name-${m.id}" type="text" autocomplete="name" placeholder="Como o RH deve te chamar?">
          </div>
          <div>
            <label for="esc-email-${m.id}">E-mail (opcional)</label>
            <input id="esc-email-${m.id}" type="email" autocomplete="email" placeholder="pra te avisar quando tiver resposta">
          </div>
          <div class="row">
            <button type="button" class="btn btn-secondary" data-action="cancel-escalate" data-id="${m.id}">Cancelar</button>
            <button type="submit" class="btn btn-primary">Enviar pro RH</button>
          </div>
        </form>
      `;
    }

    // Botões de feedback só em respostas reais da Zi (não no welcome, escalações, erros)
    let feedbackHtml = '';
    if (m.isAiAnswer && !isUser) {
      const up   = m.feedback === 'up';
      const down = m.feedback === 'down';
      const disabled = m.feedback ? 'disabled' : '';
      feedbackHtml = `
        <div class="feedback">
          <button class="fb-btn" data-action="feedback" data-rating="up"   data-id="${m.id}" aria-pressed="${up}"   aria-label="Útil"     title="Útil"     ${disabled}>👍</button>
          <button class="fb-btn" data-action="feedback" data-rating="down" data-id="${m.id}" aria-pressed="${down}" aria-label="Não útil" title="Não útil" ${disabled}>👎</button>
        </div>
      `;
    }

    return `
      <div class="msg-block">
        <div class="msg-row ${isUser ? 'user' : 'assistant'}" data-id="${m.id}">
          ${avatar}
          <div class="bubble">${renderInline(m.content)}${extra}</div>
        </div>
        ${feedbackHtml}
      </div>
    `;
  }

  function bindMessageHandlers() {
    document.querySelectorAll('[data-action="open-escalate"]').forEach(btn => {
      btn.onclick = () => openEscalateForm(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="dismiss-escalate"]').forEach(btn => {
      btn.onclick = () => dismissEscalate(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="cancel-escalate"]').forEach(btn => {
      btn.onclick = () => cancelEscalateForm(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="submit-escalate"]').forEach(form => {
      form.onsubmit = (e) => {
        e.preventDefault();
        submitEscalation(form.dataset.id);
      };
    });
    document.querySelectorAll('[data-action="feedback"]').forEach(btn => {
      btn.onclick = () => submitFeedback(btn.dataset.id, btn.dataset.rating);
    });
  }

  async function submitFeedback(messageId, rating) {
    const i = messages.findIndex(m => m.id === messageId);
    if (i === -1 || messages[i].feedback) return;
    const msg = messages[i];
    if (!msg.interactionId) {
      console.warn('feedback sem interactionId — provavelmente mensagem de erro/escalação');
      toast('Esse não dá pra avaliar');
      return;
    }
    const apiRating = rating === 'up' ? 1 : -1;

    // Otimista: trava o botão imediatamente
    messages[i].feedback = rating;
    renderMessages();

    try {
      await apiPost('feedback', { interactionId: msg.interactionId, rating: apiRating });
      toast(rating === 'up' ? 'Valeu pelo feedback! 👍' : 'Anotado, vamos melhorar 👍');
    } catch (err) {
      console.error('[Zi] feedback falhou:', err);
      messages[i].feedback = null;       // desfaz o otimismo
      renderMessages();
      toast('Não rolou registrar 😬');
    }
  }

  function scrollToBottom() {
    // espera o paint
    requestAnimationFrame(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
  }

  function pushMessage(role, content, opts = {}) {
    const msg = {
      id: uidStr(),
      role,
      content,
      type: opts.type || 'regular',
      data: opts.data || null,
    };
    messages.push(msg);
    renderMessages();
    return msg;
  }

  function updateMessage(id, patch) {
    const i = messages.findIndex(m => m.id === id);
    if (i === -1) return;
    messages[i] = { ...messages[i], ...patch };
    renderMessages();
  }

  function removeMessage(id) {
    messages = messages.filter(m => m.id !== id);
    renderMessages();
  }

  /* ---------------- Suggestions ---------------- */
  function renderSuggestions() {
    const el = document.getElementById('suggestions');
    const hasUserMsg = messages.some(m => m.role === 'user');
    if (hasUserMsg) { el.innerHTML = ''; return; }

    el.innerHTML = `
      <div class="suggestions-label">Sugestões pra começar</div>
      ${SUGGESTIONS.map(s => `<button class="chip" data-suggestion="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('')}
    `;
    el.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = () => {
        const text = chip.getAttribute('data-suggestion');
        sendUserMessage(text);
      };
    });
  }

  /* ---------------- Chat actions ---------------- */
  async function sendUserMessage(text) {
    text = (text || '').trim();
    if (!text || isWaitingReply) return;

    pushMessage('user', text);
    renderSuggestions(); // hides chips after first msg
    document.getElementById('chat-input').value = '';
    autoResizeInput();

    isWaitingReply = true;
    setSendEnabled(false);
    const typing = pushMessage('assistant', '', { type: 'typing' });

    let streamStarted = false;

    const onChunk = (full) => {
      const display = stripMarker(full);
      if (!streamStarted) {
        streamStarted = true;
        // Troca a bolha de "typing dots" pra "streaming" — full re-render (1x)
        updateMessage(typing.id, { type: 'streaming', content: display });
      } else {
        // Atualizações subsequentes — só mexe na innerHTML da bolha, sem re-render
        const i = messages.findIndex(m => m.id === typing.id);
        if (i !== -1) messages[i].content = display;
        const bubble = document.querySelector(`.msg-row[data-id="${typing.id}"] .bubble`);
        if (bubble) {
          bubble.innerHTML = renderInline(display) + '<span class="cursor"></span>';
        }
        // Auto-scroll só se o usuário já estava perto do fundo (não rouba scroll de quem subiu)
        if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 200) {
          window.scrollTo({ top: document.body.scrollHeight, behavior: 'auto' });
        }
      }
    };

    try {
      const { full, interactionId } = await callChat(messages, onChunk);

      const isUnknown = full.includes('[NAO_ENCONTREI]');

      // Salva a resposta final em zi_interactions (fire-and-forget)
      if (interactionId) {
        apiPost('save_answer', {
          interactionId,
          answer: isUnknown ? '[NAO_ENCONTREI]' : full,
        }).catch(e => console.warn('save_answer falhou:', e));
      }

      if (isUnknown) {
        updateMessage(typing.id, {
          type: 'escalate-prompt',
          content: "Hmm, essa eu não consigo responder com segurança só pelos documentos que tenho aqui 🤔\n\nQuer que eu encaminhe pro time de RH responder pessoalmente?",
          data: { originalQuestion: text, interactionId },
          isAiAnswer: false,
        });
      } else {
        updateMessage(typing.id, {
          type: 'regular',
          content: full,
          isAiAnswer: true,
          interactionId,
        });
      }
    } catch (err) {
      console.error('[Zi] Erro Gemini:', err);
      const detail = (err && err.message) ? err.message : String(err);
      updateMessage(typing.id, {
        type: 'regular',
        content: 'Ih, deu um erro na conexão com a IA 😬\n\n**Detalhe técnico:** ' + detail +
                 '\n\n(Abra o console do navegador — F12 → Console — pra ver o erro completo.)',
        isAiAnswer: false,
      });
    } finally {
      isWaitingReply = false;
      setSendEnabled(true);
      document.getElementById('chat-input').focus();
    }
  }

  function openEscalateForm(messageId) {
    const m = messages.find(x => x.id === messageId);
    if (!m) return;
    updateMessage(messageId, { type: 'escalate-form' });
    setTimeout(() => {
      const input = document.getElementById(`esc-name-${messageId}`);
      if (input) input.focus();
    }, 50);
  }

  function cancelEscalateForm(messageId) {
    updateMessage(messageId, { type: 'escalate-prompt' });
  }

  function dismissEscalate(messageId) {
    updateMessage(messageId, {
      type: 'regular',
      content: 'Sem problema! Se mudar de ideia, é só perguntar de novo ou reformular a dúvida 👋',
      data: null
    });
  }

  async function submitEscalation(messageId) {
    const m = messages.find(x => x.id === messageId);
    if (!m) return;
    const interactionId = m.data?.interactionId;
    if (!interactionId) {
      toast('Erro: não consegui identificar a pergunta 😬');
      return;
    }
    const name = (document.getElementById(`esc-name-${messageId}`)?.value || '').trim();
    const email = (document.getElementById(`esc-email-${messageId}`)?.value || '').trim();

    try {
      await apiPost('escalate', { interactionId, name, email });
      pendingCount += 1;
      updateAdminBadge();
      updateMessage(messageId, {
        type: 'regular',
        content: 'Prontinho! Sua pergunta foi enviada pro RH ✅\n\nAssim que tiver resposta eu te aviso por aqui.',
        data: null
      });
    } catch (err) {
      console.error('[Zi] escalate falhou:', err);
      toast('Falhou ao enviar 😬 tenta de novo');
    }
  }

  /* ---------------- Input ---------------- */
  function autoResizeInput() {
    const t = document.getElementById('chat-input');
    t.style.height = 'auto';
    t.style.height = Math.min(t.scrollHeight, 140) + 'px';
  }

  function setSendEnabled(on) {
    document.getElementById('send-btn').disabled = !on;
  }

  /* ---------------- Admin ---------------- */
  function updateAdminBadge() {
    const badge = document.getElementById('admin-badge');
    if (pendingCount > 0) {
      badge.textContent = pendingCount;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }

  async function refreshPendingCount() {
    try {
      const r = await apiPost('pending_count');
      pendingCount = r.count || 0;
    } catch (e) {
      console.warn('pending_count falhou:', e);
      pendingCount = 0;
    }
    updateAdminBadge();
  }

  /* ---------- Admin auth (PIN) ---------- */
  function getAdminPin() {
    return sessionStorage.getItem(ADMIN_AUTH_KEY) || null;
  }
  function isAdminAuthed() {
    return !!getAdminPin();
  }
  function logoutAdmin() {
    sessionStorage.removeItem(ADMIN_AUTH_KEY);
    renderAdmin();
    toast('Você saiu do admin');
  }

  // Estado do painel admin (carregado do servidor sob demanda)
  let adminPending = [];
  let adminTrained = [];
  let adminFeedback = [];

  async function loadAdminData() {
    const pin = getAdminPin();
    if (!pin) return;
    try {
      const [pending, trained, feedback] = await Promise.all([
        apiPost('admin_list_pending',  { pin }),
        apiPost('admin_list_trained',  { pin }),
        apiPost('admin_list_feedback', { pin }),
      ]);
      adminPending  = Array.isArray(pending)  ? pending  : [];
      adminTrained  = Array.isArray(trained)  ? trained  : [];
      adminFeedback = Array.isArray(feedback) ? feedback : [];
      pendingCount  = adminPending.length;
      updateAdminBadge();
    } catch (e) {
      console.error('[admin] load falhou:', e);
      toast('Erro carregando admin — confere console');
    }
  }

  function renderAdmin() {
    const root = document.getElementById('admin-root');
    if (!isAdminAuthed()) {
      root.innerHTML = `
        <div class="admin-gate">
          <h2>Acesso restrito</h2>
          <p>Esta área é exclusiva do time de RH. Digite o PIN pra continuar.</p>
          <input id="admin-pin-input" type="password" inputmode="text" autocomplete="off" placeholder="PIN" />
          <button class="btn btn-primary" id="admin-pin-submit">Entrar</button>
        </div>
      `;
      const input = document.getElementById('admin-pin-input');
      const submit = async () => {
        const pin = (input.value || '').trim();
        if (!pin) return;
        // Valida no servidor com uma chamada barata (admin_list_trained)
        try {
          await apiPost('admin_list_trained', { pin });
          sessionStorage.setItem(ADMIN_AUTH_KEY, pin);
          await loadAdminData();
          renderAdmin();
        } catch (e) {
          input.value = '';
          input.focus();
          toast('PIN incorreto');
        }
      };
      document.getElementById('admin-pin-submit').onclick = submit;
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
      setTimeout(() => input.focus(), 50);
      return;
    }

    // Painel autenticado
    root.innerHTML = `
      <section class="admin-section">
        <h2>Perguntas pendentes</h2>
        <p class="section-hint">Perguntas que a Zi não soube responder e foram escaladas pelos colaboradores. Responda aqui pra alimentar a base.</p>
        <div id="pending-list">${renderPendingHtml()}</div>
      </section>

      <section class="admin-section">
        <h2>Feedback dos colaboradores</h2>
        <p class="section-hint">👍 e 👎 dados nas respostas da Zi. Sinal pra identificar onde ela responde bem e onde precisa melhorar.</p>
        <div id="feedback-list">${renderFeedbackHtml()}</div>
      </section>

      <section class="admin-section">
        <h2>Respostas treinadas</h2>
        <p class="section-hint">Respostas validadas pelo RH. A Zi usa essas como referência nas próximas conversas.</p>
        <div id="trained-list">${renderTrainedHtml()}</div>
      </section>

      <div class="admin-footer">
        <button class="btn btn-ghost" id="admin-refresh">Atualizar</button>
        <button class="btn btn-ghost" id="admin-logout">Sair do admin</button>
      </div>
    `;
    bindAdminHandlers();
  }

  function renderPendingHtml() {
    if (adminPending.length === 0) {
      return `<div class="empty-state">Nenhuma pergunta pendente. Tudo em dia ✨</div>`;
    }
    return adminPending.map(p => `
      <div class="card" data-pending="${p.id}">
        <div class="card-meta">
          <span class="meta-name">${escapeHtml(p.user_name || 'Anônimo')}</span>
          ${p.user_email ? `<span>${escapeHtml(p.user_email)}</span>` : ''}
          <span>${escapeHtml(formatDate(p.created_at))}</span>
        </div>
        <p class="card-question">"${escapeHtml(p.question)}"</p>
        <textarea id="ans-${p.id}" placeholder="Escreva a resposta oficial do RH…"></textarea>
        <div class="card-actions">
          <button class="btn btn-ghost" data-action="delete-pending" data-id="${p.id}">Descartar</button>
          <button class="btn btn-primary" data-action="train-answer" data-id="${p.id}">Salvar e treinar</button>
        </div>
      </div>
    `).join('');
  }

  function renderTrainedHtml() {
    if (adminTrained.length === 0) {
      return `<div class="empty-state">Nenhuma resposta treinada ainda.</div>`;
    }
    return adminTrained.map(t => `
      <div class="card card-trained" data-trained="${t.id}">
        <div class="card-meta">
          <span class="meta-name">Treinada em ${escapeHtml(formatDate(t.created_at))}</span>
          ${t.trained_by ? `<span>por ${escapeHtml(t.trained_by)}</span>` : ''}
        </div>
        <p class="card-question">"${escapeHtml(t.question)}"</p>
        <div class="card-answer">${renderInline(t.answer)}</div>
        <div class="card-actions">
          <button class="btn btn-ghost" data-action="delete-trained" data-id="${t.id}">Remover</button>
        </div>
      </div>
    `).join('');
  }

  function renderFeedbackHtml() {
    if (adminFeedback.length === 0) {
      return `<div class="empty-state">Ainda não há feedback registrado.</div>`;
    }
    const ups   = adminFeedback.filter(f => f.rating === 1).length;
    const downs = adminFeedback.filter(f => f.rating === -1).length;
    const total = adminFeedback.length;
    const upPct = Math.round((ups / total) * 100);

    const summary = `
      <p class="section-hint" style="margin-bottom:14px">
        <strong>${ups}</strong> 👍 · <strong>${downs}</strong> 👎 · ${total} avaliações no total (${upPct}% positivas)
      </p>
    `;

    const cards = adminFeedback.map(f => `
      <div class="card card-feedback card-fb-${f.rating === 1 ? 'up' : 'down'}" data-feedback="${f.id}">
        <div class="card-meta">
          <span class="rating-badge">${f.rating === 1 ? '👍' : '👎'}</span>
          <span>${escapeHtml(formatDate(f.rating_at))}</span>
        </div>
        ${f.question ? `<p class="card-question">"${escapeHtml(f.question)}"</p>` : ''}
        <div class="card-answer">${renderInline(f.answer || '')}</div>
        <div class="card-actions">
          <button class="btn btn-ghost" data-action="delete-feedback" data-id="${f.id}">Remover</button>
        </div>
      </div>
    `).join('');

    return summary + cards;
  }

  function bindAdminHandlers() {
    document.querySelectorAll('[data-action="train-answer"]').forEach(btn => {
      btn.onclick = () => trainPending(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-pending"]').forEach(btn => {
      btn.onclick = () => deletePending(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-trained"]').forEach(btn => {
      btn.onclick = () => deleteTrained(btn.dataset.id);
    });
    document.querySelectorAll('[data-action="delete-feedback"]').forEach(btn => {
      btn.onclick = () => deleteFeedbackEntry(btn.dataset.id);
    });
    const logoutBtn = document.getElementById('admin-logout');
    if (logoutBtn) logoutBtn.onclick = logoutAdmin;
    const refreshBtn = document.getElementById('admin-refresh');
    if (refreshBtn) refreshBtn.onclick = async () => {
      await loadAdminData();
      renderAdmin();
      toast('Atualizado');
    };
  }

  async function deleteFeedbackEntry(interactionId) {
    try {
      await apiPost('admin_clear_feedback', { pin: getAdminPin(), interactionId });
      adminFeedback = adminFeedback.filter(x => String(x.id) !== String(interactionId));
      renderAdmin();
      toast('Feedback removido');
    } catch (e) { console.error(e); toast('Erro ao remover'); }
  }

  async function trainPending(interactionId) {
    const answer = (document.getElementById(`ans-${interactionId}`)?.value || '').trim();
    if (!answer) { toast('Escreva uma resposta antes de salvar'); return; }
    try {
      await apiPost('admin_save_trained', { pin: getAdminPin(), interactionId, answer });
      await loadAdminData();
      renderAdmin();
      toast('Resposta treinada ✓');
    } catch (e) { console.error(e); toast('Erro ao treinar'); }
  }

  async function deletePending(interactionId) {
    try {
      await apiPost('admin_delete_pending', { pin: getAdminPin(), interactionId });
      adminPending = adminPending.filter(x => String(x.id) !== String(interactionId));
      pendingCount = adminPending.length;
      updateAdminBadge();
      renderAdmin();
      toast('Pergunta descartada');
    } catch (e) { console.error(e); toast('Erro ao descartar'); }
  }

  async function deleteTrained(trainedId) {
    try {
      await apiPost('admin_delete_trained', { pin: getAdminPin(), trainedId });
      adminTrained = adminTrained.filter(x => String(x.id) !== String(trainedId));
      renderAdmin();
      toast('Resposta removida');
    } catch (e) { console.error(e); toast('Erro ao remover'); }
  }

  /* ---------------- View toggle ---------------- */
  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.tab-btn').forEach(b => {
      const isActive = b.dataset.view === view;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    document.getElementById('view-chat').classList.toggle('active', view === 'chat');
    document.getElementById('view-admin').classList.toggle('active', view === 'admin');
    if (view === 'admin') {
      renderAdmin();
      if (isAdminAuthed()) loadAdminData().then(renderAdmin);
    }
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ---------------- Init ---------------- */
  function init() {
    // header avatar
    document.getElementById('header-avatar').innerHTML = ziAvatar(52, true);

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.onclick = () => switchView(b.dataset.view);
    });

    // Input
    const input = document.getElementById('chat-input');
    input.addEventListener('input', autoResizeInput);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendUserMessage(input.value);
      }
    });
    document.getElementById('send-btn').onclick = () => sendUserMessage(input.value);

    // Initial render
    renderMessages();
    renderSuggestions();
    refreshPendingCount();   // popula badge a partir do servidor
    input.focus();
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
